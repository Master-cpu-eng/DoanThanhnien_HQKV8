/* ---------- PHÂN BỔ CHỈ TIÊU (chỉ Quản trị viên) ---------- */
const CT_SHORT={luot:"Lượt TN tình nguyện",khcn:"Công trình KHCN/CĐS",sang_kien:"Sáng kiến",cay:"Cây xanh",bien:"Hỗ trợ biên giới",do_dau:"Trẻ đỡ đầu",dang:"Giới thiệu Đảng"};
/* Rút gọn tên tiêu chí (tùy chọn) thành nhãn cột ngắn, dễ hiểu */
function shortCrit(name){
  const s=String(name||"").toLowerCase();
  const rules=[
    [/tuyên truyền|nghị quyết/, "Tuyên truyền NQ"],
    [/kiểm tra|quán triệt/, "Đạt y/c kiểm tra"],
    [/năng lực số/, "Nâng cao năng lực số"],
    [/ngoại ngữ/, "Bồi dưỡng ngoại ngữ"],
    [/tình nguyện/, "Lượt TN tình nguyện"],
    [/chuyển đổi số|khoa học công nghệ|khcn|cđs/, "Công trình KHCN/CĐS"],
    [/sáng kiến/, "Sáng kiến"],
    [/cây xanh|trồng.*cây|cây/, "Cây xanh"],
    [/biên giới/, "Hỗ trợ biên giới"],
    [/đỡ đầu/, "Trẻ đỡ đầu"],
    [/xuất sắc|xếp loại/, "Xếp loại HTXS"],
    [/kết nạp|đvưt|giới thiệu.*đảng/, "Giới thiệu Đảng"]
  ];
  for(const [re,lab] of rules){ if(re.test(s)) return lab; }
  // Không khớp mẫu: cắt theo từ, tối đa ~22 ký tự
  const full=String(name||"").trim(), w=full.split(/\s+/); let out="";
  for(const x of w){ if((out+" "+x).trim().length>22) break; out=(out+" "+x).trim(); }
  return out ? (out.length<full.length?out+"…":out) : full;
}
function colLabel(c){
  if(c.custom) return shortCrit(c.name);
  if(RENAME[c.key]&&RENAME[c.key].name) return shortCrit(RENAME[c.key].name);
  return CT_SHORT[c.key]||c.name;
}
/* Xác định tiêu chí thuộc LĨNH VỰC nào (để form tự hiện ô nhập theo lĩnh vực) */
function critLinhVuc(name){
  const s=String(name||"").toLowerCase();
  if(/tuyên truyền|nghị quyết|quán triệt|kiểm tra/.test(s)) return LINH_VUC[0];   // Giáo dục chính trị, tư tưởng, tuyên truyền
  if(/năng lực số|ngoại ngữ/.test(s)) return LINH_VUC[5];                          // Đồng hành với thanh niên
  if(/tình nguyện|cây xanh|trồng.*cây/.test(s)) return LINH_VUC[1];                // Tình nguyện vì cộng đồng (gồm trồng cây)
  if(/biên giới/.test(s)) return LINH_VUC[2];                                      // Hỗ trợ nhân dân vùng biên giới
  if(/khoa học công nghệ|chuyển đổi số|sáng kiến|sáng tạo|đổi mới|khcn|cđs/.test(s)) return LINH_VUC[3]; // KHCN, CĐS, sáng tạo
  if(/đỡ đầu|thiếu nhi|thiếu niên|nhi đồng|trẻ em/.test(s)) return LINH_VUC[7];    // Chăm lo thiếu niên, nhi đồng
  if(/kết nạp|giới thiệu.*đảng|đvưt/.test(s)) return LINH_VUC[8];                    // Xây dựng Đoàn, tham gia xây dựng Đảng
  return ""; // Xếp loại HTXS (cuối năm) và các tiêu chí không gắn hoạt động -> không hiện ở form nhập hoạt động
}
function critLVName(c){ return c.custom?c.name:((RENAME[c.key]&&RENAME[c.key].name)||c.name); }
function openCritEdit(c){
  const root=$("#modalRoot");
  const isBuiltin=!c.custom;
  root.innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:460px">
    <div class="modal-head"><span>${isBuiltin?"Đổi tên tiêu chí mặc định":"Sửa tiêu chí"}</span><button class="x" id="ce_close">×</button></div>
    <div class="form-grid">
      <div class="full req"><label>Tên tiêu chí</label><input id="ce_ten" value="${esc(c.name)}"></div>
      <div class="full"><label>Đơn vị tính</label><input id="ce_dvt" value="${esc(c.unit||"")}" placeholder="VD: lượt"></div>
      ${isBuiltin?'<div class="full hint">Chỉ đổi <b>tên hiển thị</b> của tiêu chí mặc định; số liệu đã nhập được giữ nguyên. Dùng để đặt đúng tên theo văn bản, khỏi phải tạo tiêu chí trùng.</div>':''}
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" id="ce_cancel">Hủy</button><button class="btn btn-primary" id="ce_save">Lưu thay đổi</button></div>
  </div></div>`;
  const close=()=>root.innerHTML="";
  $("#ce_close").onclick=close;$("#ce_cancel").onclick=close;
  $("#ce_save").onclick=async()=>{
    const ten=$("#ce_ten").value.trim(); if(!ten){toast("Nhập tên tiêu chí.","bad");return;}
    const dvt=$("#ce_dvt").value.trim();
    try{$("#ce_save").disabled=true;$("#ce_save").textContent="Đang lưu…";
      if(isBuiltin){ const r=Object.assign({},RENAME); r[c.key]={name:ten,unit:dvt}; await Store.saveSetting("crit_rename",JSON.stringify(r)); RENAME=r; }
      else { await Store.updateCriteria({id:c.id,ten,dvt}); }
      close();toast("Đã cập nhật tiêu chí.","ok");await reload();
    }catch(e){toast("Lưu thất bại: "+e.message,"bad");$("#ce_save").disabled=false;$("#ce_save").textContent="Lưu thay đổi";}
  };
}

    const map={};
    scroll.querySelectorAll(".tgt-in").forEach(inp=>{const dv=inp.getAttribute("data-dv"),k=inp.getAttribute("data-k"),val=num(ungroup(inp.value));const rec=(map[dv]=map[dv]||{don_vi:dv,nam:curYear,__ex:{}});if(isCustom(k))rec.__ex[k]=val;else rec[k]=val;});
    const ovrRec={don_vi:DON_VI[0],nam:curYear,__ex:{}};CRIT.forEach(c=>{const v=ovrVal(c.key);if(c.custom)ovrRec.__ex[c.key]=v;else ovrRec[c.key]=v;});
    const rows=Object.keys(map).map(k=>{const r=map[k];r.extra=JSON.stringify(r.__ex);delete r.__ex;return r;});
    ovrRec.extra=JSON.stringify(ovrRec.__ex);delete ovrRec.__ex;rows.push(ovrRec);
    try{save.disabled=true;save.textContent="Đang lưu…";await Store.saveTargets(rows);toast("Đã lưu chỉ tiêu & phân bổ năm "+curYear+".","ok");await reload();}
    catch(e){toast("Lưu thất bại: "+e.message,"bad");save.disabled=false;save.innerHTML=IC.save+"Lưu phân bổ";}
  };
  const auto=el("button","btn btn-ghost",IC.scale+"Chia đều tự động");
  auto.title="Chia đều chỉ tiêu toàn Đoàn cho 8 chi đoàn";
  auto.onclick=()=>{
    if(!confirm("Chia đều chỉ tiêu toàn Đoàn (theo số ở dòng “Chỉ tiêu toàn Đoàn”) cho 8 chi đoàn? Các số đang nhập sẽ bị ghi đè."))return;
    CRIT.forEach(c=>{
      const tgt=ovrVal(c.key), base=Math.floor(tgt/units.length), rem=tgt-base*units.length;
      [...scroll.querySelectorAll('.tgt-in[data-k="'+c.key+'"]')].forEach((inp,idx)=>{const v=base+(idx<rem?1:0);inp.value=v?groupVN(v):"";});
    });
    recalc();toast("Đã chia đều. Kiểm tra rồi bấm Lưu phân bổ.","ok");
  };
  const resetBtn=el("button","btn btn-ghost",IC.reset+"Đặt lại");
  resetBtn.title="Khôi phục bảng về số đã lưu gần nhất";
  resetBtn.onclick=()=>{
    if(!confirm("Đặt lại bảng về số đã lưu gần nhất? Các thay đổi chưa lưu sẽ bị bỏ."))return;
    scroll.querySelectorAll(".tgt-in").forEach(inp=>{const dv=inp.getAttribute("data-dv"),k=inp.getAttribute("data-k");const v=unitTargets(dv,curYear).map[k];inp.value=v?groupVN(v):"";});
    const om=overallTargets(curYear).map;
    scroll.querySelectorAll(".ovr-in").forEach(inp=>{const k=inp.getAttribute("data-k");inp.value=om[k]?groupVN(om[k]):"";});
    recalc();toast("Đã đặt lại về số đã lưu.","ok");
  };
  foot.appendChild(save);foot.appendChild(auto);foot.appendChild(resetBtn);
  foot.appendChild(el("span","hint","Cột tỷ lệ % <b>tự chia theo quân số</b> (Danh sách đoàn viên) — không cần nhập, tự cập nhật khi quân số thay đổi. Các cột định lượng: “Chỉ tiêu toàn Đoàn” chỉnh trực tiếp, ô trống = 0."));
  card.appendChild(foot);box.appendChild(card);

  // Khu vực thêm tiêu chí tùy chọn
  const addCard=el("div","card");addCard.style.marginTop="16px";
  addCard.appendChild(el("h3",null,"Thêm tiêu chí tùy chọn"));
  addCard.appendChild(el("p","hint","Tạo tiêu chí mới (ngoài 7 tiêu chí mặc định) để giao cho các chi đoàn. Tiêu chí mới sẽ thành một cột trong bảng trên."));
  const addWrap=el("div");addWrap.style.cssText="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px";
  const nameI=el("input");nameI.placeholder="Tên tiêu chí (VD: Hiến máu tình nguyện)";nameI.style.cssText="padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;min-width:240px;flex:1";
  const unitI=el("input");unitI.placeholder="Đơn vị tính (VD: lượt)";unitI.style.cssText="padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;width:170px";
  const addC=el("button","btn btn-primary",IC.add+"Thêm tiêu chí");addC.style.width="auto";
  addC.onclick=async()=>{const ten=nameI.value.trim();if(!ten){toast("Nhập tên tiêu chí.","bad");return;}try{addC.disabled=true;await Store.addCriteria({ten,dvt:unitI.value.trim()});toast("Đã thêm tiêu chí.","ok");await reload();}catch(e){toast("Không thêm được: "+e.message,"bad");addC.disabled=false;}};
  addWrap.appendChild(nameI);addWrap.appendChild(unitI);addWrap.appendChild(addC);
  addCard.appendChild(addWrap);
  if(HIDDEN_CRIT&&HIDDEN_CRIT.length){
    const restore=el("button","btn btn-ghost btn-sm",IC.reset+"Khôi phục tiêu chí mặc định");restore.style.marginTop="10px";
    restore.onclick=async()=>{
      if(!confirm("Hiện lại toàn bộ "+HIDDEN_CRIT.length+" tiêu chí mặc định đã ẩn?"))return;
      try{await Store.saveSetting("crit_hidden","[]");HIDDEN_CRIT=[];toast("Đã khôi phục tiêu chí mặc định.","ok");await reload();}
      catch(e){toast("Không lưu được: "+e.message,"bad");}
    };
    addCard.appendChild(restore);
  }
  box.appendChild(addCard);

  scroll.querySelectorAll(".numgrp").forEach(attachThousand);
  scroll.querySelectorAll(".tgt-in,.ovr-in").forEach(inp=>inp.addEventListener("input",recalc));
  recalc();
  return box;
}

/* ---------- THỐNG KÊ TỔNG HỢP ---------- */
function viewThongKe(){
  const u=Store.user, isAdmin=u.role==="admin";
  const box=el("div");
  box.appendChild(el("div","pagehead",`<div><h2>Thống kê tổng hợp</h2><p>Bảng tổng hợp nhanh theo từng chi đoàn: nhân sự, đảng viên, hoạt động, đỡ đầu — hỗ trợ quản lý, điều hành.</p></div>`));
  const bar=el("div","periodbar");bar.style.marginBottom="16px";bar.innerHTML=`<label>Năm hoạt động</label>`;
  const ys=el("select");NAM_LIST.forEach(y=>{const o=new Option("Năm "+y,y);if(y===curYear)o.selected=true;ys.appendChild(o);});
  ys.onchange=()=>{curYear=parseInt(ys.value);switchScope(curYear,render);};bar.appendChild(ys);box.appendChild(bar);

  const units = isAdmin ? DON_VI.slice(1) : [u.don_vi];
  const row=dv=>{
    const mem=MEMBERS.filter(m=>m.don_vi===dv);
    const dd=DODAU.filter(m=>m.don_vi===dv);
    return {
      dv, soDV:mem.length,
      dang:mem.filter(m=>String(m.dang_vien).toLowerCase()==="x").length,
      nu:mem.filter(m=>String(m.gioi_tinh||"").trim().toLowerCase().startsWith("nữ")).length,
      soHD:ACT.filter(a=>a.don_vi===dv&&num(a.nam||2026)===curYear).length,
      soTre:dd.length, muc:dd.reduce((s,m)=>s+num(m.muc_thang),0)
    };
  };
  const rows=units.map(row);
  const tot=rows.reduce((t,r)=>({soDV:t.soDV+r.soDV,dang:t.dang+r.dang,nu:t.nu+r.nu,soHD:t.soHD+r.soHD,soTre:t.soTre+r.soTre,muc:t.muc+r.muc}),{soDV:0,dang:0,nu:0,soHD:0,soTre:0,muc:0});

  const stats=el("div");stats.style.cssText="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px";
  stats.innerHTML=statChip("Tổng đoàn viên",fmt(tot.soDV),"var(--red)")+statChip("Đảng viên",fmt(tot.dang),"#B8860B")+statChip("Trẻ đỡ đầu",fmt(tot.soTre),"#0A7E4A")+statChip("Hoạt động năm "+curYear,fmt(tot.soHD),"#6B7280");
  box.appendChild(stats);

  const card=el("div","card");const scroll=el("div","tablescroll");
  const t=el("table");
  t.innerHTML=`<thead><tr><th>Đơn vị</th><th class="num">Đoàn viên</th><th class="num">Đảng viên</th><th class="num">Nữ</th><th class="num">Hoạt động ${curYear}</th><th class="num">Trẻ đỡ đầu</th><th class="num">Mức đỡ đầu/tháng</th></tr></thead>`;
  const tbody=el("tbody");
  rows.forEach(r=>{
    const tr=el("tr");
    tr.innerHTML=`<td><b>${esc(r.dv)}</b></td><td class="num">${fmt(r.soDV)}</td><td class="num">${fmt(r.dang)}</td><td class="num">${fmt(r.nu)}</td><td class="num">${fmt(r.soHD)}</td><td class="num">${fmt(r.soTre)}</td><td class="num">${r.muc?fmt(r.muc):"–"}</td>`;
    tbody.appendChild(tr);
  });
  if(isAdmin){
    const tr=el("tr");tr.style.cssText="font-weight:800;background:#F3F7FB";
    tr.innerHTML=`<td>TỔNG CỘNG</td><td class="num">${fmt(tot.soDV)}</td><td class="num">${fmt(tot.dang)}</td><td class="num">${fmt(tot.nu)}</td><td class="num">${fmt(tot.soHD)}</td><td class="num">${fmt(tot.soTre)}</td><td class="num">${fmt(tot.muc)}</td>`;
    tbody.appendChild(tr);
  }
  t.appendChild(tbody);scroll.appendChild(t);card.appendChild(scroll);box.appendChild(card);
  box.appendChild(el("div","banner",'<b>ℹ</b><div>Số liệu đoàn viên và đỡ đầu lấy từ hai danh sách tương ứng; số hoạt động lấy theo năm đã chọn. Cập nhật danh sách sẽ tự động phản ánh vào bảng này.</div>'));
  return box;
}

/* ---------- HƯỚNG DẪN SỬ DỤNG ---------- */

    <div class="tipbox">Nếu máy không có mạng khi nhập file, hãy lưu file sang định dạng <b>CSV</b> rồi nhập lại.</div>`);

  sec("7. Thống kê tổng hợp",`
    <p>Bảng tổng hợp nhanh theo từng chi đoàn: số đoàn viên, đảng viên, nữ, số hoạt động trong năm, số trẻ đỡ đầu và tổng mức đỡ đầu/tháng. ${isAdmin?"Quản trị viên thấy cả dòng <b>Tổng cộng</b> của 9 đơn vị.":"Chi đoàn thấy dòng của đơn vị mình."}</p>`);

  if(isAdmin){
    sec("8. Phân bổ chỉ tiêu & quản lý tiêu chí (chỉ Quản trị viên)",`
      <ol>
        <li>Vào <b>Phân bổ chỉ tiêu</b> → chọn <b>Năm phân bổ</b>.</li>
        <li>Nhập chỉ tiêu cho từng chi đoàn ở từng cột. Dòng <b>Tổng đã phân bổ</b> cập nhật ngay; nếu <b>vượt chỉ tiêu chung</b>, ô chuyển đỏ và hiện cảnh báo.</li>
        <li>Dòng <b>“Chỉ tiêu toàn Đoàn”</b> (nền xanh) <b>chỉnh trực tiếp được</b> — đây là chỉ tiêu chung của cả Đoàn theo từng năm.</li>
        <li><b>Chia đều tự động</b>: chia đều chỉ tiêu chung cho 8 chi đoàn. <b>Đặt lại</b>: khôi phục về số đã lưu.</li>
        <li>Bấm <b>Lưu phân bổ</b> để lưu cả chỉ tiêu chung lẫn phân bổ cho từng chi đoàn.</li>
      </ol>
      <p><b>Tự thêm / sửa / xóa tiêu chí:</b></p>
      <ul>
        <li><b>Thêm tiêu chí mới</b> (ngoài 7 tiêu chí mặc định): ở khu <b>“Thêm tiêu chí tùy chọn”</b>, nhập tên + đơn vị tính → <b>Thêm tiêu chí</b>. Tiêu chí mới thành một cột trong bảng.</li>
        <li>Trên đầu mỗi cột tiêu chí tự thêm có nút <b>✎</b> (sửa tên/đơn vị, giữ nguyên số đã phân bổ) và <b>✕</b> (xóa).</li>
        <li><b>Sắp xếp thứ tự cột</b> bằng mũi tên <b>◀ ▶</b> trên đầu mỗi cột.</li>
        <li><b>Ẩn tiêu chí mặc định</b> không dùng bằng nút <b>✕</b> trên cột đó; bấm <b>“Khôi phục tiêu chí mặc định”</b> để hiện lại.</li>
      </ul>
      <div class="tipbox">Tiêu chí tự thêm được <b>giao chỉ tiêu tại bảng trên</b> và có <b>thanh tiến độ</b> ở Tổng quan/Đối chiếu giống các chỉ tiêu mặc định. Với nhóm tiêu chí <b>tỷ lệ (%)</b>, hệ thống tính <b>đạt 100%</b> khi đơn vị có hoạt động thuộc lĩnh vực tương ứng ở tab Nhập liệu. Ẩn/xóa tiêu chí nào thì các nơi đó tự cập nhật theo.</div>`);

    sec("9. Quản trị tài khoản (chỉ Quản trị viên)",`
      <p>Đặt lại mật khẩu cho chi đoàn khi cần: bấm <b>Đặt lại mật khẩu → 123456</b> ở dòng đơn vị tương ứng. Chi đoàn đăng nhập bằng <b>123456</b> và bắt buộc đổi mật khẩu ngay lần đầu.</p>
      <p>Danh sách 9 tài khoản đăng nhập (tên đăng nhập):</p>
      <ul>
        <li>doanchicuc — Đoàn Chi cục (Quản trị)</li>
        <li>chidoan1, chidoan2 — Chi đoàn số 1, số 2</li>
        <li>doikshq — Chi đoàn Đội Kiểm soát Hải quan</li>
        <li>hongai, campha, vangia — cửa khẩu cảng Hòn Gai, Cẩm Phả, Vạn Gia</li>
        <li>mongcai — cửa khẩu quốc tế Móng Cái</li>
        <li>hoanhmo — cửa khẩu Hoành Mô – Bắc Phong Sinh</li>
      </ul>`);
  }

  sec((isAdmin?"10":"8")+". Mẹo & xử lý sự cố",`
    <ul>
      <li><b>Dữ liệu tự cập nhật:</b> phần mềm tự đồng bộ số liệu mới khoảng <b>mỗi phút</b> và mỗi khi đồng chí <b>quay lại trang</b>, nên ${isAdmin?"Quản trị viên":"đồng chí"} thường thấy cập nhật của các đơn vị khác mà không cần tải lại. Vẫn có <b>nút làm mới</b> (biểu tượng mũi tên xoay) trên thanh trên cùng nếu muốn cập nhật ngay. Đang mở form nhập liệu thì hệ thống <b>không tự làm mới</b> để khỏi mất thao tác.</li>
      <li><b>Số liệu chưa cập nhật?</b> Thử chọn lại Năm/Kỳ hoặc tải lại trang.</li>
      <li><b>Không lưu được?</b> Kiểm tra kết nối mạng; dữ liệu được lưu trên Google Trang tính dùng chung.</li>
      <li><b>Quên mật khẩu:</b> liên hệ Quản trị viên (Đoàn Chi cục) để đặt lại về 123456.</li>
      <li><b>Xuất file Excel</b> mở lần đầu có thể hỏi định dạng — chọn <b>Yes/Đồng ý</b> là mở bình thường.</li>
    </ul>`);

  box.appendChild(wrap);
  return box;
}

/* ---------- QUẢN TRỊ TÀI KHOẢN (chỉ Quản trị viên) ---------- */
function viewTaiKhoan(){
  const box=el("div");
  const head=el("div","pagehead");
  head.innerHTML=`<div><h2>Quản trị tài khoản</h2><p>Thêm tài khoản cho các chi đoàn, sửa tên đăng nhập, hoặc đặt lại mật khẩu về <b>123456</b>. Sau khi đặt lại/khởi tạo, chi đoàn bắt buộc đổi mật khẩu ngay lần đăng nhập đầu.</p></div>`;
  const addBtn=el("button","btn btn-primary",IC.add+"Thêm tài khoản");
  addBtn.onclick=()=>openAccountForm("add",null);
  const acts=el("div");acts.style.cssText="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;flex:0 0 auto";acts.appendChild(addBtn);
  head.appendChild(acts);box.appendChild(head);

  const RIC={
    unit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V6l7-3 7 3v15"/><path d="M2 21h20"/><path d="M9 9h.01M9 13h.01M9 17h.01M14 9h.01M14 13h.01M14 17h.01"/></svg>',
    admin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 5 6v5c0 4.4 3 7.6 7 9 4-1.4 7-4.6 7-9V6Z"/><path d="m9.2 12 1.9 1.9 3.6-3.6"/></svg>',
    unitp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c.9-3.4 3.6-5 7-5s6.1 1.6 7 5"/></svg>',
    reset:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v5h-5"/></svg>'
  };
  // Nguồn dữ liệu: danh sách tài khoản thật từ máy chủ; nếu chưa nạp được thì tạm dùng bảng tĩnh 9 đơn vị.
  let list = (ACCOUNTS && ACCOUNTS.length)
    ? ACCOUNTS.slice()
    : DON_VI.map(dv=>{const m=UNIT_ACCOUNT[dv]||{user:"",role:dv===ADMIN_UNIT?"admin":"unit",name:dv};return {user:m.user,role:m.role,don_vi:dv,name:m.name||dv};});
  list.sort((a,b)=> (a.role==="admin"?0:1)-(b.role==="admin"?0:1) || String(a.don_vi).localeCompare(String(b.don_vi)));

  const card=el("div","card");const scroll=el("div","tablescroll");
  const t=el("table");t.className="acctbl";
  t.innerHTML=`<thead><tr><th>Đơn vị</th><th>Tài khoản đăng nhập</th><th>Quyền</th><th></th></tr></thead>`;
  const tbody=el("tbody");
  list.forEach(acc=>{
    const isAdm=acc.role==="admin";
    const tr=el("tr");
    tr.innerHTML=`<td><span class="unitcell">${RIC.unit}<span>${esc(acc.don_vi)}</span></span></td><td class="mono">${esc(acc.user)}</td>
      <td><span class="pill ${isAdm?"adm":""}">${isAdm?RIC.admin:RIC.unitp}${isAdm?"Quản trị":"Chi đoàn"}</span></td><td></td>`;
    const act=el("div","rowact");
    if(!isAdm){
      const eb=el("button","iconbtn");eb.innerHTML=IC.edit+"Sửa";eb.title="Sửa đơn vị / tên đăng nhập / tên hiển thị";
      eb.onclick=()=>openAccountForm("edit",acc);
      const rb=el("button","iconbtn");rb.innerHTML=RIC.reset+"Đặt lại mật khẩu → 123456";
      rb.onclick=async()=>{
        if(!confirm(`Đặt lại mật khẩu của "${acc.don_vi}" (${acc.user}) về 123456?\nChi đoàn sẽ phải đổi mật khẩu ngay lần đăng nhập kế tiếp.`))return;
        try{await Store.resetPassword(acc.user);toast("Đã đặt lại mật khẩu về 123456.","ok");}
        catch(e){toast("Không đặt lại được: "+e.message,"bad");}
      };
      act.appendChild(eb);act.appendChild(rb);
    }else act.innerHTML='<span style="color:var(--muted);font-size:12px">Tài khoản quản trị</span>';
    tr.lastChild.appendChild(act);tbody.appendChild(tr);
  });
  t.appendChild(tbody);scroll.appendChild(t);card.appendChild(scroll);box.appendChild(card);
  box.appendChild(el("div","banner",'<b>ℹ</b><div>Thêm tài khoản chi đoàn mới bằng nút <b>“+ Thêm tài khoản”</b>. Có thể sửa tên đăng nhập ở nút <b>Sửa</b>. Ngoài ra, Quản trị vẫn có thể chỉnh trực tiếp trong tab <b>TaiKhoan</b> của Google Trang tính.</div>'));
  return box;
}
/* Hộp thoại thêm / sửa tài khoản chi đoàn */
function openAccountForm(mode, acc){
  const isEdit = mode==="edit";
  const o = acc || {user:"",name:"",don_vi:""};
  const units = DON_VI.filter(d=>d!==ADMIN_UNIT);                 // chỉ các chi đoàn (bỏ đơn vị Quản trị)
  const curDV = o.don_vi || units[0] || "";
  const known = units.indexOf(curDV)>=0;
  const unitOptions = units.map(d=>`<option value="${esc(d)}" ${d===curDV?"selected":""}>${esc(d)}</option>`).join("")
     + `<option value="__custom" ${(!known)?"selected":""}>➕ Nhập đơn vị mới…</option>`;
  const root=$("#modalRoot");
  root.innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:520px">
    <div class="modal-head"><span>${isEdit?"Sửa tài khoản chi đoàn":"Thêm tài khoản chi đoàn"}</span><button class="x" id="ac_close">×</button></div>
    <div class="form-grid" style="grid-template-columns:1fr">
      <div id="ac_err" class="err hidden full"></div>
      <div class="full"><label>Đơn vị / Chi đoàn</label><select id="ac_dv">${unitOptions}</select></div>
      <div class="full" id="ac_dvcustom_wrap" style="display:${(!known)?"block":"none"}"><label>Tên đơn vị mới</label><input id="ac_dvcustom" value="${(!known)?esc(curDV):""}" placeholder="VD: Chi đoàn số 3"></div>
      <div class="full"><label>Tài khoản đăng nhập</label><input id="ac_user" value="${esc(o.user||"")}" placeholder="vd: chidoan3" autocomplete="off" autocapitalize="none"><div class="hint">3–20 ký tự: chữ thường không dấu, số, dấu chấm hoặc gạch dưới.</div></div>
      <div class="full"><label>Tên hiển thị</label><input id="ac_name" value="${esc(o.name||"")}" placeholder="vd: Chi đoàn số 3"></div>
      ${isEdit?"":`<div class="full"><label>Mật khẩu khởi tạo</label><input id="ac_pass" value="123456"><div class="hint">Chi đoàn bắt buộc đổi mật khẩu ở lần đăng nhập đầu.</div></div>`}
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" id="ac_cancel">Hủy</button><button class="btn btn-primary" id="ac_save">${isEdit?"Lưu thay đổi":"Thêm tài khoản"}</button></div>
  </div></div>`;
  const close=()=>root.innerHTML="";
  $("#ac_close").onclick=close;$("#ac_cancel").onclick=close;
  const showErr=m=>{const e=$("#ac_err");e.textContent=m;e.classList.remove("hidden");};
  const dvSel=$("#ac_dv");
  dvSel.onchange=()=>{ $("#ac_dvcustom_wrap").style.display = dvSel.value==="__custom"?"block":"none"; };
  $("#ac_save").onclick=async()=>{
    $("#ac_err").classList.add("hidden");
    const g=id=>{const e=$("#"+id);return e?e.value.trim():"";};
    const dv = dvSel.value==="__custom" ? g("ac_dvcustom") : dvSel.value;
    const user=g("ac_user").toLowerCase(), name=g("ac_name");
    if(!dv){showErr("Vui lòng chọn hoặc nhập tên đơn vị.");return;}
    if(!user){showErr("Vui lòng nhập tên tài khoản đăng nhập.");return;}
    if(!/^[a-z0-9_.]{3,20}$/.test(user)){showErr("Tên đăng nhập 3–20 ký tự, chỉ gồm chữ thường không dấu, số, dấu chấm hoặc gạch dưới.");return;}
    try{
      $("#ac_save").disabled=true;$("#ac_save").textContent="Đang lưu…";
      if(isEdit) await Store.updateAccount(o.user,{user,name:name||dv,don_vi:dv});
      else       await Store.addAccount({user,name:name||dv,don_vi:dv,pass:g("ac_pass")});
      close();
      toast(isEdit?"Đã cập nhật tài khoản.":`Đã thêm tài khoản ${user}.`,"ok");
      await loadAccounts(); render();
    }catch(e){ showErr(e.message||"Không lưu được tài khoản."); const b=$("#ac_save"); if(b){b.disabled=false;b.textContent=isEdit?"Lưu thay đổi":"Thêm tài khoản";} }
  };
}

/* ---------- ĐỔI MẬT KHẨU ---------- */
function openPwModal(force){
  const root=$("#modalRoot");
  root.innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:460px">
    <div class="modal-head"><span>${force?"Đổi mật khẩu lần đầu":"Đổi mật khẩu"}</span>${force?"":'<button class="x" id="pw_close">×</button>'}</div>
    ${force?'<div class="pw-note">Vì lý do bảo mật, bạn cần đổi mật khẩu trước khi sử dụng hệ thống.</div>':""}
    <div class="form-grid" style="grid-template-columns:1fr">
      <div id="pw_err" class="err hidden full"></div>
      <div class="full"><label>Mật khẩu hiện tại</label><div class="pwwrap"><input id="pw_old" type="password" autocomplete="current-password" placeholder="Mật khẩu đang dùng"><button type="button" class="pweye" data-for="pw_old" aria-label="Hiện/ẩn mật khẩu"></button></div></div>
      <div class="full"><label>Mật khẩu mới</label><div class="pwwrap"><input id="pw_new" type="password" autocomplete="new-password" placeholder="Ít nhất 6 ký tự"><button type="button" class="pweye" data-for="pw_new" aria-label="Hiện/ẩn mật khẩu"></button></div></div>
      <div class="full"><label>Nhập lại mật khẩu mới</label><div class="pwwrap"><input id="pw_new2" type="password" autocomplete="new-password" placeholder="Gõ lại mật khẩu mới"><button type="button" class="pweye" data-for="pw_new2" aria-label="Hiện/ẩn mật khẩu"></button></div></div>
    </div>
    <div class="modal-foot">${force?"":'<button class="btn btn-ghost" id="pw_cancel">Hủy</button>'}<button class="btn btn-primary" id="pw_save">Đổi mật khẩu</button></div>
  </div></div>`;
  const close=()=>root.innerHTML="";
  initPwEyes(root);
  if(!force){$("#pw_close").onclick=close;$("#pw_cancel").onclick=close;}
  const showErr=m=>{const e=$("#pw_err");e.textContent=m;e.classList.remove("hidden");};
  $("#pw_save").onclick=async()=>{
    const o=$("#pw_old").value, n=$("#pw_new").value, n2=$("#pw_new2").value;
    $("#pw_err").classList.add("hidden");
    if(!o||!n||!n2){showErr("Vui lòng nhập đầy đủ các ô.");return;}
    if(n.length<6){showErr("Mật khẩu mới phải có ít nhất 6 ký tự.");return;}
    if(n!==n2){showErr("Hai lần nhập mật khẩu mới chưa khớp.");return;}
    if(n===o){showErr("Mật khẩu mới phải khác mật khẩu hiện tại.");return;}
    try{
      $("#pw_save").disabled=true;$("#pw_save").textContent="Đang đổi…";
      await Store.changePassword(o,n);
      close();toast("Đổi mật khẩu thành công.","ok");
    }catch(e){showErr(e.message||"Đổi mật khẩu thất bại.");$("#pw_save").disabled=false;$("#pw_save").textContent="Đổi mật khẩu";}
  };
}

$("#loginBtn").onclick=doLogin;
$("#li_pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
/* Ghi nhớ mật khẩu: nạp lại nếu đã lưu trên máy này */
try{
  const _rm=JSON.parse(localStorage.getItem("hqkv8_remember")||"null");
  if(_rm&&_rm.u){ $("#li_user").value=_rm.u; $("#li_pass").value=_rm.p||""; if($("#li_remember"))$("#li_remember").checked=true; }
}catch(e){}
initPwEyes();
initLoginUI();
(async()=>{
  try{
    const ok = await Promise.resolve(Store.restore());
    if(ok) enterApp();
  }catch(e){}
})();
