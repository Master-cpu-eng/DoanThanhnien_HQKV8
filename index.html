<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo dõi hoạt động Đoàn — Chi cục Hải quan khu vực VIII</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#0A5CA8; --red-2:#084A88; --red-bright:#1877D2; --gold:#E3A008; --gold-2:#B97F06;
  --gold-soft:#FBEECB; --ink:#16202B; --muted:#5E6B78; --bg:#EAF1F8; --card:#FFFFFF;
  --line:#DCE6EF; --green:#1E8E4E; --green-soft:#E4F4EA; --amber:#B26A00; --amber-soft:#FBEFD8;
  --red-text:#C0392B; --red-soft:#FBE7E4; --shadow:0 1px 3px rgba(20,20,30,.08),0 8px 24px rgba(20,20,30,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Plus Jakarta Sans","Be Vietnam Pro",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--red)}
.tnum{font-variant-numeric:tabular-nums}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
#login{min-height:100vh;min-height:100dvh;display:flex;justify-content:center;padding:clamp(12px,3vh,24px);position:relative;overflow-x:hidden;overflow-y:auto;
  background:radial-gradient(130% 118% at 50% -8%,#2f9bea 0%,#1a78cc 30%,#125a9f 55%,#0d417a 78%,#0a3462 100%)}
/* ==== Nền động hiện đại cho màn hình đăng nhập (không đụng thẻ/logo/chữ) ==== */
#login .login-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
#login .login-card{position:relative;z-index:1;box-shadow:0 30px 72px rgba(0,0,0,.55),0 0 0 1px rgba(130,195,255,.10),0 0 64px rgba(34,224,255,.10)}
.lg-grid{position:absolute;left:-15%;right:-15%;top:-40%;bottom:-8%;
  background-image:linear-gradient(rgba(96,176,255,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(96,176,255,.11) 1px,transparent 1px);
  background-size:46px 46px;
  transform:perspective(680px) rotateX(60deg) translateY(-5%) scale(1.7);transform-origin:50% 0;
  -webkit-mask-image:radial-gradient(ellipse 72% 62% at 50% 32%,#000 18%,transparent 74%);
          mask-image:radial-gradient(ellipse 72% 62% at 50% 32%,#000 18%,transparent 74%);
  animation:lgDrift 26s linear infinite}
@keyframes lgDrift{to{background-position:0 46px,46px 0}}
.lg-orb{position:absolute;border-radius:50%;filter:blur(72px)}
.lg-orb.a{width:460px;height:460px;background:radial-gradient(circle,#2a7fff,transparent 65%);top:-150px;left:-120px;opacity:.5;animation:lgFloatA 17s ease-in-out infinite}
.lg-orb.b{width:540px;height:540px;background:radial-gradient(circle,#22e0ff,transparent 62%);bottom:-200px;right:-160px;opacity:.38;animation:lgFloatB 21s ease-in-out infinite}
.lg-orb.c{width:300px;height:300px;background:radial-gradient(circle,#3b82f6,transparent 60%);top:44%;left:60%;opacity:.28;animation:lgFloatA 19s ease-in-out infinite reverse}
@keyframes lgFloatA{50%{transform:translate(42px,32px)}}
@keyframes lgFloatB{50%{transform:translate(-52px,-30px)}}
.lg-glow{position:absolute;left:50%;top:-8%;width:920px;height:430px;transform:translateX(-50%);
  background:radial-gradient(ellipse at center,rgba(34,224,255,.15),transparent 70%);filter:blur(22px)}
.lg-particles{position:absolute;inset:0}
.lg-particles i{position:absolute;bottom:-12px;width:3px;height:3px;border-radius:50%;background:#8fecff;box-shadow:0 0 8px 1px #8fecff;opacity:0;animation:lgRise linear infinite}
@keyframes lgRise{0%{transform:translateY(0);opacity:0}10%{opacity:.9}86%{opacity:.85}100%{transform:translateY(-104vh);opacity:0}}
/* ---- Lớp vi mạch điện tử phát sáng: ĐẶT SAU THẺ + che mờ vùng trung tâm để mạch chỉ chạy ở viền ngoài ---- */
.lg-circuit{position:absolute;inset:0;
  -webkit-mask:radial-gradient(ellipse 46% 60% at 50% 50%,transparent 46%,#000 80%);
          mask:radial-gradient(ellipse 46% 60% at 50% 50%,transparent 46%,#000 80%)}
.lg-circuit svg{position:absolute;inset:0;width:100%;height:100%}
.lg-trace{fill:none;stroke:rgba(120,190,255,.30);stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.lg-flow{fill:none;stroke:#9fe9ff;stroke-width:1.8;stroke-linecap:round;stroke-dasharray:36 964;filter:drop-shadow(0 0 4px #22e0ff);animation:lgCurrent linear infinite}
@keyframes lgCurrent{to{stroke-dashoffset:-1000}}
.lg-node{fill:rgba(150,215,255,.55)}
.lg-node.glow{fill:#bff0ff;filter:drop-shadow(0 0 5px #22e0ff)}
.lg-warm{position:absolute;left:50%;bottom:-6%;width:760px;height:230px;transform:translateX(-50%);
  background:radial-gradient(ellipse at center,rgba(255,200,90,.10),transparent 70%);filter:blur(20px)}
@media (prefers-reduced-motion:reduce){.lg-grid,.lg-orb,.lg-particles i,.lg-flow{animation:none!important}.lg-flow{display:none}}
.login-card{width:100%;max-width:452px;margin:auto;background:var(--card);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.35);
  overflow:hidden}
.login-head{background:linear-gradient(180deg,#0A6AB8,#084A88);color:#fff;padding:clamp(16px,3.4vh,28px) 28px clamp(13px,2.6vh,22px);text-align:center;position:relative}
.login-head .star{font-size:30px;color:var(--gold);filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}
.login-head h1{font-size:clamp(12.5px,2.15vh,14.5px);margin-top:clamp(5px,1.1vh,8px);line-height:1.3;letter-spacing:-.2px}
.login-head p{margin:clamp(4px,.9vh,6px) 0 0;font-size:clamp(11px,1.75vh,12.5px);opacity:.9;font-weight:500}
.login-body{padding:clamp(14px,2.8vh,24px) 28px clamp(16px,3.2vh,28px)}
.field{margin-bottom:clamp(9px,1.8vh,14px)}
.field label{display:block;font-size:clamp(11.5px,1.7vh,12.5px);font-weight:600;color:var(--muted);margin-bottom:clamp(4px,.8vh,6px)}
.field input,.field select{width:100%;padding:clamp(8px,1.5vh,11px) 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--red)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;
  padding:11px 16px;font-weight:700;font-size:14px;transition:transform .05s,filter .15s}
.btn:active{transform:translateY(1px)}
.btn svg{width:16px;height:16px;flex:none}
.iconbtn svg{width:14px;height:14px;flex:none;vertical-align:-2px;margin-right:5px}
.mclink svg,.mcplain svg{width:14px;height:14px;flex:none;vertical-align:-2px;margin-right:4px}
.btn-primary{background:var(--red);color:#fff;width:100%}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:#c9ccd1}
.btn-gold{background:var(--gold);color:#3a2c00}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.login-note{margin-top:clamp(10px,2.2vh,16px);font-size:12px;color:var(--muted);text-align:center;line-height:1.55}
.remember-row{display:flex;align-items:center;gap:8px;margin:clamp(2px,.6vh,4px) 0 clamp(10px,2.2vh,16px);cursor:pointer;user-select:none;font-size:13px;color:var(--ink)}
.remember-row input{width:17px;height:17px;accent-color:var(--red);cursor:pointer;flex:none}
.login-body .btn-primary{padding-top:clamp(9px,1.7vh,12px);padding-bottom:clamp(9px,1.7vh,12px)}
.mode-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin-top:10px}
.mode-demo{background:var(--amber-soft);color:var(--amber)}
.mode-cloud{background:var(--green-soft);color:var(--green)}
.err{background:var(--red-soft);color:var(--red-text);border:1px solid #f2c9c4;border-radius:9px;padding:9px 11px;font-size:13px;margin-bottom:12px;font-weight:500}

/* ---------- APP SHELL ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27200%27%20height%3D%27200%27%20viewBox%3D%270%200%20200%20200%27%3E%3Cg%20fill%3D%27none%27%20stroke%3D%27rgba%28255%2C255%2C255%2C0.06%29%27%20stroke-width%3D%271.4%27%3E%3Cpath%20d%3D%27M0%2040%20H70%20V10%27%2F%3E%3Cpath%20d%3D%27M200%2040%20H130%20V80%27%2F%3E%3Cpath%20d%3D%27M40%20200%20V150%20H90%27%2F%3E%3Cpath%20d%3D%27M160%20200%20V120%20H120%20V92%27%2F%3E%3Cpath%20d%3D%27M0%20120%20H30%20V160%27%2F%3E%3Cpath%20d%3D%27M100%200%20V50%20H150%27%2F%3E%3Cpath%20d%3D%27M200%20160%20H150%20V130%27%2F%3E%3Cpath%20d%3D%27M60%2060%20H100%20V100%27%2F%3E%3Cpath%20d%3D%27M10%2090%20H40%27%2F%3E%3C%2Fg%3E%3Cg%20fill%3D%27rgba%28150%2C210%2C255%2C0.11%29%27%3E%3Ccircle%20cx%3D%2770%27%20cy%3D%2710%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%27130%27%20cy%3D%2780%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%2790%27%20cy%3D%27150%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%27120%27%20cy%3D%2792%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%2730%27%20cy%3D%27160%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%27150%27%20cy%3D%2750%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%27150%27%20cy%3D%27130%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%27100%27%20cy%3D%27100%27%20r%3D%273%27%2F%3E%3Ccircle%20cx%3D%2740%27%20cy%3D%2790%27%20r%3D%272.4%27%2F%3E%3C%2Fg%3E%3Crect%20x%3D%2786%27%20y%3D%2786%27%20width%3D%2728%27%20height%3D%2728%27%20rx%3D%274%27%20fill%3D%27none%27%20stroke%3D%27rgba%28150%2C210%2C255%2C0.09%29%27%20stroke-width%3D%271%27%2F%3E%3C%2Fsvg%3E"),linear-gradient(90deg,#084A88,#0A6AB8);color:#fff;padding:0 26px;height:94px;display:flex;
  align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.brand{display:flex;align-items:center;gap:14px;font-weight:800;font-size:18.5px;line-height:1.18}
.brand .star{color:var(--gold);font-size:20px}
.brand small{display:block;font-weight:500;font-size:12.5px;opacity:.85}
.topbar .spacer{flex:1}
.userchip{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.12);padding:5px 13px 5px 6px;border-radius:99px;font-size:13px;font-weight:600}
/* Đồng hồ thời gian thực trên thanh tiêu đề */
.topclock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.15;margin-right:14px;color:#fff;user-select:none}
.topclock .t{font-size:17px;font-weight:800;letter-spacing:.03em;font-variant-numeric:tabular-nums}
.topclock .d{font-size:11px;font-weight:600;opacity:.82}
@media(max-width:900px){.topclock{display:none}}
/* Nút làm mới (chỉ còn icon) đặt trước tên đơn vị trong thẻ */
.chiprefresh{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;flex:none;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:99px;cursor:pointer;transition:background .15s}
.chiprefresh:hover{background:rgba(255,255,255,.3)}
.chiprefresh svg{width:15px;height:15px}
.chiprefresh.spin svg{animation:refspin .8s linear infinite}
.chiprefresh[disabled]{opacity:.7;cursor:default}
@keyframes refspin{to{transform:rotate(360deg)}}
@media(max-width:720px){.userchip{padding:5px 10px 5px 5px}}
.userchip .role{font-size:10.5px;background:var(--gold);color:#3a2c00;padding:2px 7px;border-radius:99px;font-weight:800}
/* Nút mở menu (☰) và lớp phủ nền — chỉ hiện trên điện thoại */
.navbtn{display:none;align-items:center;justify-content:center;width:40px;height:40px;flex:none;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.26);color:#fff;border-radius:10px;cursor:pointer}
.navbtn svg{width:22px;height:22px}
.navbackdrop{display:none;position:fixed;inset:0;background:rgba(10,25,45,.45);z-index:190;opacity:0;transition:opacity .2s}
.navbackdrop.show{display:block;opacity:1}
/* ===== Bố cục thanh điều hướng dọc (sidebar) ===== */
.shell{display:flex;align-items:stretch;min-height:calc(100vh - 94px)}
.sidebar{width:240px;flex:none;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:12px 10px;gap:3px;position:sticky;top:94px;align-self:flex-start;height:calc(100vh - 94px);transition:width .18s ease}
.sidebar.collapsed{width:66px}
.navlist{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;overflow-x:hidden}
.navbottom{display:flex;flex-direction:column;gap:3px;flex:none;padding-top:8px;border-top:1px solid var(--line);margin-top:8px}
.navitem{display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;border:none;background:none;border-radius:11px;cursor:pointer;color:var(--ink);font-weight:600;font-size:13.5px;text-align:left;white-space:normal;overflow:visible;font-family:inherit;line-height:1.35}
.navitem:hover{background:#EDF3F9}
.navitem.active{background:var(--red);color:#fff}
.navitem.danger{color:#C0392B}
.navitem.danger:hover{background:#FDECEA}
.navitem .ic{flex:none;width:24px;height:24px;display:grid;place-items:center}
.navitem .ic svg{width:21px;height:21px}
.navitem .lbl{flex:1;min-width:0;overflow:visible;line-height:1.35;padding:1px 0;white-space:normal;word-break:break-word}
.sidebar.collapsed .navitem .lbl{display:none}
.navtoggle{color:var(--muted)}
.sidebar.collapsed .navitem{justify-content:center;padding:11px 0;gap:0}
.sidebar.collapsed .navitem .lbl{display:none}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
@media(max-width:820px){
  .navbtn{display:inline-flex}
  .topbar{height:60px;padding:0 12px;gap:10px}
  .brand{font-size:14px;gap:9px}
  .brand small{font-size:10.5px}
  .brand-logo{width:38px;height:38px}
  .brand-logos{gap:6px}
  .userchip{padding:4px 9px 4px 4px;font-size:12px;gap:6px}
  .userchip .role{display:none}
  .chiprefresh{width:26px;height:26px}
  .shell{min-height:calc(100vh - 60px)}
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:272px;max-width:82vw;z-index:200;
    transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 22px rgba(0,0,0,.28);padding:14px 10px}
  .sidebar.open{transform:translateX(0)}
  .sidebar.collapsed{width:272px}
  .sidebar.collapsed .navitem{justify-content:flex-start;padding:12px 12px;gap:12px}
  .sidebar.collapsed .navitem .lbl{display:block}
  .navtoggle{display:none}
  .navitem{font-size:15px;padding:12px 12px}
  .content .wrap{padding:14px 12px 60px}
  .pagehead h2{font-size:19px}
  .tablescroll table{min-width:560px}
  .periodbar{flex-wrap:wrap}
}
@media(max-width:420px){
  .brand small{display:none}
  .brand{font-size:13px}
}
/* ===== Tối ưu hiển thị & thao tác trên điện thoại (web mobile) ===== */
@media(max-width:820px){
  body{overflow-x:hidden}
  input,select,textarea{font-size:16px}          /* chặn iOS tự phóng to khi chạm ô nhập */
  .tablescroll{-webkit-overflow-scrolling:touch}
  .toolbar{padding:12px}
  .modal-bg{padding:8px}
  .modal{max-height:94vh}
}
@media(max-width:640px){
  .pagehead{flex-direction:column;align-items:stretch;gap:10px}
  .pagehead h2{font-size:18px}
  .kpigrid{grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
  .kpi .val{font-size:19px}
  .panel{padding:14px 13px 6px}
  .greet{padding:16px 42px 16px 18px}
  .modal-foot{flex-direction:column;gap:8px}
  .modal-foot .btn{width:100%}
  .btn-sm{padding:9px 12px}
}
@media(max-width:380px){
  .kpigrid{grid-template-columns:1fr}
  .kpi .val{font-size:24px}
}
.acctbl svg{width:16px;height:16px;vertical-align:-3px}
.acctbl .unitcell{display:flex;align-items:center;gap:9px}
.acctbl .unitcell svg{flex:none;color:var(--red)}
.acctbl .pill svg{margin-right:4px}
.acctbl .iconbtn svg{margin-right:6px;color:inherit}
.wrap{max-width:none;margin:0;padding:24px 32px 60px;width:100%}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.pagehead>div:first-child{flex:1 1 260px;min-width:0}
.pagehead h2{font-size:20px}
.pagehead p{margin:4px 0 0;color:var(--muted);font-size:13px}

/* period selector */
.periodbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow)}
.periodbar label{font-size:12.5px;font-weight:700;color:var(--red)}
.periodbar select{padding:8px 10px;border:1.5px solid var(--line);border-radius:8px}
.periodbar .rng{font-size:12px;color:var(--muted);font-weight:600}

/* KPI cards */
.kpigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin:16px 0}
.kpi{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);border-top:4px solid var(--red)}
.kpi.k-gold{border-top-color:var(--gold)} .kpi.k-green{border-top-color:var(--green)} .kpi.k-teal{border-top-color:#1F6F5C} .kpi.k-navy{border-top-color:#1F3864}
.kpi .lab{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.kpi .val{font-size:30px;font-weight:800;margin-top:6px;line-height:1}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:4px}

/* target progress */
.panel{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:18px 18px 8px;margin-bottom:18px}
.panel h3{font-size:14px;color:var(--red);margin-bottom:4px}
.panel .phint{font-size:12px;color:var(--muted);margin-bottom:12px}
.tgt{display:grid;grid-template-columns:1.5fr auto 1.9fr 52px;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.unitacc{border:1px solid var(--line);border-radius:11px;margin:10px 0;overflow:hidden;background:#fff}
.unithead2{width:100%;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#F3F7FB;border:none;padding:12px 15px;cursor:pointer;text-align:left;font-family:inherit;font-size:14px}
.unithead2:hover{background:#E9F1F8}
.unithead2 .ua-arrow{color:var(--red);font-weight:800;transition:transform .15s;display:inline-block}
.unithead2.open .ua-arrow{transform:rotate(90deg)}
.unithead2 .ua-name{font-weight:800;color:var(--ink);flex:1;min-width:180px}
.unithead2 .ua-meta{font-size:12.5px;color:var(--muted);font-weight:700}
.unithead2 .ua-warn{font-size:12px;font-weight:800;color:#C0392B;background:#FDEDEC;padding:3px 10px;border-radius:99px}
.unithead2 .ua-ok{font-size:12px;font-weight:800;color:#1e7a46;background:#E7F6EE;padding:3px 10px;border-radius:99px}
.unitbody2{padding:14px 16px}
.tgt.tgt-under .name{color:#C0392B;font-weight:700}
.tgt:last-child{border-bottom:none}
.tgt .name{font-weight:600;font-size:13.5px}
.tgt .frac{font-weight:700;font-size:13.5px;text-align:right;white-space:nowrap}
.tgt .frac small{color:var(--muted);font-weight:500}
.bar{height:16px;border-radius:99px;background:#E9EEF4;position:relative;box-shadow:inset 0 1px 2px rgba(15,23,42,.09)}
.bar>span{position:absolute;left:0;top:0;bottom:0;min-width:16px;border-radius:99px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.bar>span::after{content:"";position:absolute;left:2px;right:2px;top:1.5px;height:42%;border-radius:99px;background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0))}
.pctlab{font-size:14px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.01em;white-space:nowrap}
.lv-green>span{background:linear-gradient(90deg,#34D399,#059669);box-shadow:0 1px 5px rgba(5,150,105,.38)}
.lv-amber>span{background:linear-gradient(90deg,#FBBF24,#D97706);box-shadow:0 1px 5px rgba(217,119,6,.34)}
.lv-red>span{background:linear-gradient(90deg,#F87171,#DC2626);box-shadow:0 1px 5px rgba(220,38,38,.32)}

/* table */
.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:14px 16px;border-bottom:1px solid var(--line)}
.toolbar select,.toolbar input{padding:8px 10px;border:1.5px solid var(--line);border-radius:8px}
.tablescroll{overflow:auto;max-height:72vh;-webkit-overflow-scrolling:touch}
.selcol{width:40px;text-align:center;white-space:nowrap}
.selcol input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--red);vertical-align:middle}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
th{background:#F7F8FA;font-weight:700;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;position:sticky;top:0;z-index:2;white-space:nowrap;box-shadow:inset 0 -1px 0 var(--line)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:#FBFCFD}
.tag{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:#EEF1F4;color:#555;line-height:1.35;white-space:normal;max-width:100%}
.rowact{display:flex;gap:6px}
.iconbtn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;font-size:12px;font-weight:600}
.iconbtn:hover{border-color:#c9ccd1}
.iconbtn.del{color:var(--red-text)}
.empty{padding:40px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px}

.login-logos{display:flex;gap:clamp(14px,4vh,26px);justify-content:center;align-items:center;margin-bottom:clamp(8px,1.8vh,14px)}
.login-logos .logo{width:clamp(56px,11vh,98px);height:clamp(56px,11vh,98px);object-fit:contain;filter:drop-shadow(0 3px 9px rgba(0,0,0,.38))}
.brand-logo{width:60px;height:60px;flex:none;object-fit:contain;filter:drop-shadow(0 2px 5px rgba(0,0,0,.35))}
.brand-logos{display:flex;gap:10px;align-items:center}
/* form modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,30,.5);display:grid;place-items:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:720px;max-height:92vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.modal-head{background:linear-gradient(90deg,#084A88,#0A6AB8);color:#fff;padding:16px 20px;font-weight:800;position:sticky;top:0;display:flex;justify-content:space-between;align-items:center}
.modal-head .x{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;width:30px;height:30px;font-size:18px}
.form-grid{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-grid label{display:flex;align-items:flex-end;min-height:30px;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;line-height:1.25}
.form-grid input,.form-grid select,.form-grid textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;outline:none}
.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{border-color:var(--red)}
.form-grid .req label::after{content:" *";color:var(--red)}
.pwwrap{position:relative}
.pwwrap input{width:100%;padding-right:46px}
.pweye{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--muted);padding:6px;display:grid;place-items:center;border-radius:8px}
.pweye:hover{color:var(--ink);background:#EEF3F8}
.pweye svg{width:20px;height:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.numgroup{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 14px;grid-column:1/-1;background:#F7F8FA;padding:12px;border-radius:10px;align-items:stretch}
.numgroup>div{display:flex;flex-direction:column;height:100%}
.numgroup>div>label{flex:1 1 auto;align-items:flex-start;min-height:34px;margin-bottom:6px}
.numgroup>div>.numgrp{margin-top:auto}
.acttbl th{vertical-align:middle;line-height:1.28}
.acttbl thead th{z-index:3}
.formsec{grid-column:1/-1;background:linear-gradient(90deg,#0A6AB8,#1877D2);color:#fff;font-weight:800;font-size:13px;padding:9px 13px;border-radius:9px;margin-top:6px;display:flex;align-items:center;gap:8px}
.formsec span{font-weight:500;opacity:.92;font-size:11.5px}
.subhead{grid-column:1/-1;font-weight:700;font-size:12.5px;color:var(--red);margin:2px 0 -4px}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px}

/* report text */
.report{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:22px 24px;white-space:pre-wrap;line-height:1.85;font-size:14.5px}
.report .lead{font-weight:700;margin-bottom:8px}
.banner{background:var(--amber-soft);border:1px solid #f0d69a;color:#7a5200;border-radius:12px;padding:12px 15px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.banner.cloud{background:var(--green-soft);border-color:#bfe0c0;color:#255c28}
.banner b{font-weight:800}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1B1B1B;color:#fff;padding:11px 18px;border-radius:99px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:200;opacity:0;transition:opacity .25s,transform .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.toast.ok{background:#1f6f3d}.toast.bad{background:#a4231b}
/* minh chứng link */
.mclink{display:inline-flex;align-items:center;gap:4px;color:var(--red);font-weight:600;font-size:12px;text-decoration:none;margin-top:3px}
.mclink:hover{text-decoration:underline}
.mcplain{color:var(--muted);font-size:12px;margin-top:2px}
/* greeting banner — gradient xanh thanh niên → cyan, có vệt sáng quét & bàn tay vẫy */
.greet{position:relative;overflow:hidden;background:linear-gradient(100deg,#084A88 0%,#0A6AB8 42%,#0EA5C9 78%,#22D3EE 100%);color:#fff;border-radius:16px;padding:17px 46px 17px 22px;margin-bottom:16px;box-shadow:0 10px 26px rgba(10,90,168,.28),0 2px 6px rgba(10,90,168,.18);display:flex;align-items:center;gap:16px;animation:greetIn .5s cubic-bezier(.22,1,.36,1) both}
.greet::before{content:"";position:absolute;top:0;bottom:0;left:-40%;width:36%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.28),transparent);transform:skewX(-18deg);animation:greetSweep 4.5s ease-in-out infinite;pointer-events:none}
.greet>*{position:relative;z-index:1}
.greet .ic{font-size:30px;line-height:1;transform-origin:70% 80%;animation:greetWave 2.6s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.greet h3{font-size:16.5px;margin-bottom:3px;font-weight:800}
.greet h3 .rolechip{display:inline-block;margin-left:8px;font-size:10.5px;font-weight:800;letter-spacing:.03em;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);padding:2px 9px;border-radius:99px;vertical-align:middle;text-transform:uppercase}
.greet p{margin:0;font-size:12.5px;opacity:.94}
.greet .quote{margin-top:7px;font-size:12px;font-style:italic;opacity:.9;display:flex;align-items:center;gap:6px}
.greet .quote::before{content:"✦";font-style:normal;opacity:.8}
.greet .ghide{position:absolute;top:9px;right:11px;z-index:2;width:26px;height:26px;border:none;border-radius:99px;background:rgba(255,255,255,.16);color:#fff;font-size:17px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:background .15s}
.greet .ghide:hover{background:rgba(255,255,255,.32)}
@keyframes greetIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes greetSweep{0%{left:-40%}55%,100%{left:120%}}
@keyframes greetWave{0%,60%,100%{transform:rotate(0)}70%{transform:rotate(16deg)}80%{transform:rotate(-10deg)}90%{transform:rotate(12deg)}}
@media(prefers-reduced-motion:reduce){.greet,.greet::before,.greet .ic{animation:none}}
/* year selector inside periodbar */
.periodbar .yr{font-size:12.5px;font-weight:700;color:var(--gold-2)}
.periodbar .sep{width:1px;align-self:stretch;background:var(--line)}
/* profile */
.profcard{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:20px 22px;margin-bottom:18px}
.profcard h3{font-size:15px;color:var(--red);margin-bottom:2px}
.profcard .phint{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.prof-grid .full{grid-column:1/-1}
.prof-grid label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.prof-grid input{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;outline:none}
.prof-grid input:focus{border-color:var(--red)}
.prof-grid input:disabled{background:#F3F4F6;color:var(--ink)}
.prof-sum{background:var(--gold-soft);border:1px solid #f0d69a;border-radius:10px;padding:11px 14px;font-size:13px;color:#7a5200;grid-column:1/-1}
.prof-sum b{font-weight:800;font-size:15px}
/* account admin table */
.acctbl td .pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;background:#EEF1F4;color:#555}
.acctbl td .pill.adm{background:var(--gold-soft);color:var(--gold-2)}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px}
/* forced password modal note */
.pw-note{background:var(--amber-soft);border:1px solid #f0d69a;color:#7a5200;border-radius:9px;padding:9px 11px;font-size:12.5px;margin:0 20px 4px}
.topact{display:flex;gap:8px;align-items:center}
@media(max-width:720px){.form-grid{grid-template-columns:1fr}.numgroup{grid-template-columns:1fr 1fr}.tgt{grid-template-columns:1fr;gap:6px}.tgt .frac{text-align:left}.tgt .pctlab{text-align:left}.kpi .val{font-size:26px}.prof-grid{grid-template-columns:1fr}.greet{flex-direction:column;text-align:center;gap:8px}}
.guide details{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:12px;overflow:hidden}
.guide summary{cursor:pointer;padding:14px 18px;font-weight:700;font-size:15px;color:var(--ink);list-style:none;display:flex;align-items:center;gap:10px}
.guide summary::-webkit-details-marker{display:none}
.guide summary::before{content:"▸";color:var(--red);font-size:13px;transition:transform .15s}
.guide details[open] summary::before{transform:rotate(90deg)}
.guide .gbody{padding:2px 20px 16px 38px;color:#333;font-size:13.5px;line-height:1.65}
.guide .gbody ol,.guide .gbody ul{margin:6px 0 10px 18px;padding:0}
.guide .gbody li{margin:5px 0}
.guide .gbody b{color:var(--ink)}
.guide .gbody p{margin:6px 0}
.guide .tipbox{background:#EFF6FF;border:1px solid #CFE3FB;border-radius:9px;padding:10px 12px;margin-top:8px}
</style>

<script>
/* Nền đăng nhập: sinh hạt phát sáng bay lên + dòng điện chạy trên vi mạch (tự bỏ qua nếu không có phần tử / thu gọn chuyển động) */
(function(){
  try{
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    var box=document.getElementById('lgParticles');
    if(box&&!reduce){
      var colors=['#8fecff','#5aa8ff','#7c9cff'];
      for(var i=0;i<14;i++){
        var p=document.createElement('i');
        var c=colors[i%3];
        p.style.left=(Math.random()*100)+'%';
        p.style.background=c;
        p.style.boxShadow='0 0 8px 1px '+c;
        var dur=7+Math.random()*8;
        p.style.animationDuration=dur+'s';
        p.style.animationDelay=(-Math.random()*dur)+'s';
        var sz=(2+Math.random()*2.4).toFixed(1);
        p.style.width=sz+'px';p.style.height=sz+'px';
        box.appendChild(p);
      }
    }
    var traces=document.querySelectorAll('#lgTraces .lg-trace');
    if(traces.length&&!reduce){
      var fcol=['#9fe9ff','#7fd4ff','#8fb4ff'];
      traces.forEach(function(t,i){
        var f=t.cloneNode();
        f.setAttribute('class','lg-flow');
        var c=fcol[i%3];
        f.style.stroke=c;
        f.style.filter='drop-shadow(0 0 4px '+c+')';
        f.style.animationDuration=(3.5+Math.random()*4)+'s';
        f.style.animationDelay=(-Math.random()*6)+'s';
        t.parentNode.appendChild(f);
      });
    }
  }catch(e){}
})();
</script>

const groupVN=v=>{v=String(v==null?"":v).replace(/[^\d]/g,"");return v?v.replace(/\B(?=(\d{3})+(?!\d))/g,"."):"";};
const ungroup=v=>String(v==null?"":v).replace(/[^\d]/g,"");
function attachThousand(input){
  if(!input) return;
  input.setAttribute("inputmode","numeric");
  input.value=groupVN(input.value);
  input.addEventListener("input",()=>{const atEnd=input.selectionStart===input.value.length;input.value=groupVN(input.value);if(atEnd){try{input.selectionStart=input.selectionEnd=input.value.length;}catch(e){}}});
}
function fmtDMY(v){
  if(v==null) return "";
  if(v instanceof Date) return d2vn(v);
  let s=String(v).trim(); if(!s) return "";
  if(/T\d/.test(s)){ const d=new Date(s); if(!isNaN(d)) return d2vn(d); } // ISO ngày-giờ (dùng giờ địa phương)
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); return m?`${m[3]}/${m[2]}/${m[1]}`:s;
}
function d2vn(d){return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}
/* Chuẩn hóa mọi kiểu ngày về yyyy-mm-dd cho <input type="date"> */
function toDateInput(v){
  if(v==null) return "";
  if(v instanceof Date) return dISO(v);
  let s=String(v).trim(); if(!s) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m) return `${m[3]}-${String(m[2]).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`;
  const d=new Date(s); if(!isNaN(d)) return dISO(d);
  return "";
}
function dISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function debounce(fn,ms){let t;return function(){const a=arguments,c=this;clearTimeout(t);t=setTimeout(()=>fn.apply(c,a),ms||150);};}
const pctVN=x=>x.toFixed(1).replace(".",",");

function cacheKey(){return "dtn_cache_"+((Store.user&&Store.user.user)||"x");}
let _dataSig="";
/* ---- Nạp dữ liệu theo NĂM: mặc định tải năm hiện tại cho nhanh, nạp thêm khi người dùng chọn năm khác / "Tất cả năm" ---- */
let LOADED_ALL=false; let LOADED_YEARS=new Set();
async function fetchAllData(nam){
  if(Store.bootstrap) return await Store.bootstrap(nam);
  const [a,p,m,dd,t,c,st]=await Promise.all([
    Store.list(nam),
    Store.listProfiles().catch(()=>[]), Store.listMembers().catch(()=>[]),
    Store.listDodau().catch(()=>[]), Store.listTargets().catch(()=>[]),
    Store.listCriteria().catch(()=>[]), Store.getSettings().catch(()=>({}))
  ]);
  return {activities:a,profiles:p,members:m,dodau:dd,targets:t,criteria:c,settings:st||{}};
}
function _currentData(){ return {activities:ACT,profiles:PROFILES,members:MEMBERS,dodau:DODAU,targets:TARGETS,criteria:CUSTOM_CRIT,settings:SETTINGS}; }
async function reload(fromCache){
  // Hiển thị ngay dữ liệu đã lưu tạm (nếu có) để không phải chờ máy chủ
  if(fromCache){
    try{const c=JSON.parse(sessionStorage.getItem(cacheKey()));if(c){applyData(c);render();}}catch(e){}
  }
  let d;
  try{ d=await fetchAllData(curYear); }               // chỉ tải hoạt động của năm hiện tại
  catch(e){ toast("Lỗi tải dữ liệu: "+e.message,"bad"); if(!fromCache) render(); return; }
  applyData(d);
  LOADED_ALL=false; LOADED_YEARS=new Set([num(curYear)]);
  _dataSig=JSON.stringify(d);
  try{sessionStorage.setItem(cacheKey(),_dataSig);}catch(e){}
  render();
}
/* Nạp bổ sung hoạt động của một năm (hoặc TẤT CẢ năm) khi người dùng chọn xem; trả true nếu vừa nạp thêm */
async function ensureScope(scope){   // scope: số năm hoặc "__all"
  if(LOADED_ALL) return false;
  if(scope==="__all"){
    const rows=await Store.list();                     // tất cả năm
    ACT=rows; LOADED_ALL=true; LOADED_YEARS=new Set(NAM_LIST.map(num));
  } else {
    scope=num(scope);
    if(!scope || LOADED_YEARS.has(scope)) return false;
    const rows=await Store.list(scope);                // chỉ năm này -> gộp vào ACT
    ACT=ACT.filter(a=>num(a.nam)!==scope).concat(rows); LOADED_YEARS.add(scope);
  }
  _dataSig=JSON.stringify(_currentData());
  try{sessionStorage.setItem(cacheKey(),_dataSig);}catch(e){}
  return true;
}
/* Đổi năm: nạp thêm dữ liệu năm đó (nếu chưa có) rồi vẽ lại; báo lỗi nhẹ nếu mất mạng */
async function switchScope(scope, after){
  try{ await ensureScope(scope); }catch(e){ toast("Chưa tải được dữ liệu năm đã chọn: "+e.message,"bad"); }
  if(after) after();
}
/* Tự động đồng bộ: lấy dữ liệu mới nền (đúng phạm vi năm đang xem), chỉ vẽ lại khi CÓ thay đổi và KHÔNG đang mở form */
async function silentSync(){
  if(!Store.user) return;
  const mr=$("#modalRoot"); if(mr && mr.innerHTML.trim()) return; // đang mở form -> để yên
  const wantAll = LOADED_ALL || LOADED_YEARS.size>1;             // đã xem nhiều năm -> đồng bộ toàn bộ
  let d; try{ d=await fetchAllData(wantAll?null:curYear); }catch(e){ return; }
  if((d.activities||[]).length===0 && ACT.length>0 && (wantAll||LOADED_YEARS.has(num(curYear)))) return; // nghi ngờ lỗi mạng
  const sig=JSON.stringify(d);
  if(sig===_dataSig) return;            // không đổi -> không vẽ lại
  _dataSig=sig; applyData(d);
  if(wantAll){ LOADED_ALL=true; LOADED_YEARS=new Set(NAM_LIST.map(num)); }
  else { LOADED_ALL=false; LOADED_YEARS=new Set([num(curYear)]); }
  try{sessionStorage.setItem(cacheKey(),sig);}catch(e){}
  render();
  toast("Đã cập nhật dữ liệu mới nhất.","ok");
}
let _autoSyncOn=false;
function startAutoSync(){
  if(_autoSyncOn) return; _autoSyncOn=true;
  setInterval(silentSync, 60000);                                   // định kỳ 60 giây
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) silentSync(); }); // khi quay lại tab
  window.addEventListener("focus",()=>silentSync());
}

/* Nén ảnh phía trình duyệt trước khi tải lên: giảm kích thước (cạnh dài tối đa ~1600px) và nén JPEG ~0.82.
   Có phương án dự phòng: ảnh GIF/SVG hoặc khi canvas lỗi thì giữ nguyên tệp gốc. */
function compressImage(file){
  return new Promise((resolve)=>{
    try{
      if(!file || !/^image\//.test(file.type||"") || /gif|svg/i.test(file.type||"")){
        const r=new FileReader(); r.onerror=()=>resolve(null); r.onload=()=>resolve({data:String(r.result).split(",")[1],mime:file.type||"image/jpeg",name:file.name}); r.readAsDataURL(file); return;
      }
      const url=URL.createObjectURL(file);
      const img=new Image();
      const fallback=()=>{ try{URL.revokeObjectURL(url);}catch(e){} const r=new FileReader(); r.onerror=()=>resolve(null); r.onload=()=>resolve({data:String(r.result).split(",")[1],mime:file.type||"image/jpeg",name:file.name}); r.readAsDataURL(file); };
      img.onload=()=>{
        try{
          const MAX=1600; let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
          const scale=Math.min(1, MAX/Math.max(w,h)); w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
          const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
          cv.getContext("2d").drawImage(img,0,0,w,h);
          try{URL.revokeObjectURL(url);}catch(e){}
          const out=cv.toDataURL("image/jpeg",0.82);
          if(!out || out.indexOf("data:image/jpeg")!==0){ return fallback(); }
          const base=String(file.name||("anh_"+Date.now())).replace(/\.[^.]+$/,"")+".jpg";
          resolve({data:out.split(",")[1],mime:"image/jpeg",name:base});
        }catch(e){ fallback(); }
      };
      img.onerror=fallback;
      img.src=url;
    }catch(e){ resolve(null); }
  });
}

function aggFrom(rows){
  const sum=k=>rows.reduce((s,a)=>s+num(a[k]),0);
  const luot_tn=rows.filter(a=>a.linh_vuc===LV_TINHNGUYEN).reduce((s,a)=>s+num(a.luot),0);
  const out={
    rows, count:rows.length,
    luot:luot_tn, khcn:sum("khcn"), sang_kien:sum("sang_kien"), cay:sum("cay"),
    bien:sum("bien"), do_dau:sum("do_dau"), dang:sum("dang"),
    luot_all:sum("luot"), kinh_phi:sum("kinh_phi"),
    units:new Set(rows.map(a=>a.don_vi)).size
  };
  customCrit().forEach(c=>{ out[c.key]=rows.reduce((s,a)=>s+num(parseExtra(a)[c.key]),0); });
  return out;
}

/* Chỉ tiêu áp dụng: quản trị = chỉ tiêu toàn Đoàn; chi đoàn = chỉ tiêu được phân bổ */
/* Danh sách chỉ tiêu = 7 mặc định + tiêu chí Quản trị tự thêm */
// Chỉ giữ lại tiêu chí tự thêm là "Xếp loại HTXS" (tính từ Danh sách đoàn viên); bỏ mọi tiêu chí tự thêm khác — hệ thống chỉ dùng các tiêu chí cứng.
function customCrit(){return CUSTOM_CRIT.map(c=>({key:"c_"+c.id,id:c.id,name:c.ten,unit:c.dvt||"",target:0,custom:true}));}
function allCrit(){
  let list=CHITIEU.filter(c=>!(HIDDEN_CRIT&&HIDDEN_CRIT.indexOf(c.key)>=0))
    .map(c=>{const r=RENAME[c.key];return r?Object.assign({},c,{name:r.name||c.name,unit:(r.unit!=null&&r.unit!=="")?r.unit:c.unit}):c;})
    .concat(customCrit());
  if(CRIT_ORDER&&CRIT_ORDER.length){
    const pos=k=>{const i=CRIT_ORDER.indexOf(k);return i<0?1000+list.findIndex(c=>c.key===k):i;};
    list=list.slice().sort((a,b)=>pos(a.key)-pos(b.key));
  }
  return list;
}
function parseExtra(row){try{return row&&row.extra?JSON.parse(row.extra):{};}catch(e){return{};}}
/* Chỉ tiêu "Xếp loại HTXS": lấy từ Danh sách đoàn viên (đếm số HTXS), không từ hoạt động */
function isHTXSCrit(c){return /xếp loại|xuất sắc/.test(String(c&&c.name||"").toLowerCase());}
/* Chỉ tiêu dạng % (đơn vị tính "%", không phải HTXS): đạt 100% khi có hoạt động thuộc lĩnh vực tương ứng */
function isPctCrit(c){return String(c&&c.unit||"").trim()==="%" && !isHTXSCrit(c);}
/* Chỉ tiêu "Đỡ đầu thiếu nhi": tự đếm từ tab Danh sách đỡ đầu.
   Nhận diện theo KEY mặc định (do_dau) HOẶC theo TÊN (kể cả tiêu chí Quản trị tự thêm / đã đổi tên),
   để số cháu đỡ đầu luôn hiển thị đúng ở mọi tiêu chí liên quan. */
function isDoDauCrit(c){
  if(!c) return false;
  if(c.key==="do_dau") return true;
  return /đỡ\s*đầu/i.test(String(c.name||"")) && !isPctCrit(c) && !isHTXSCrit(c);
}
/* Ghi chú cho tiêu chí "Xếp loại HTXS": nhắc người dùng vào tab Danh sách đoàn viên để cập nhật */
function critNote(c){
  if(isHTXSCrit(c)) return '<div class="hint" style="margin-top:3px;font-weight:500;color:var(--muted)">🛈 Tự động tính từ tab <b>Danh sách đoàn viên</b>: bấm <b>Sửa</b> từng đoàn viên → chọn <b>“Xếp loại đoàn viên (cuối năm)” = Hoàn thành xuất sắc nhiệm vụ</b> và <b>“Năm xếp loại”</b> đúng năm.</div>';
  if(isDoDauCrit(c)) return '<div class="hint" style="margin-top:3px;font-weight:500;color:var(--muted)">🛈 Tự động tính từ tab <b>Danh sách đỡ đầu</b> (đếm số cháu mỗi chi đoàn nhận đỡ đầu). Thêm/sửa cháu ở tab đó, số sẽ tự cập nhật.</div>';
  if(isPctCrit(c) && pctCritLV(c)) return '<div class="hint" style="margin-top:3px;font-weight:500;color:var(--muted)">🛈 Tiêu chí tỷ lệ %: mỗi chi đoàn được giao <b>một phần theo quân số</b> (đơn vị đông đoàn viên phần lớn hơn); hoàn thành khi đơn vị tổ chức hoạt động tương ứng. Cả 8 đơn vị hoàn thành → toàn Đoàn <b>= 100%</b>. Dùng nút <b>“Chia theo quân số”</b> ở tab Phân bổ để tự chia.</div>';
  const lvs=pctCritLV(c);
  if(lvs) return '<div class="hint" style="margin-top:3px;font-weight:500;color:var(--muted)">🛈 Đạt <b>100%</b> khi đơn vị có ít nhất 1 hoạt động thuộc lĩnh vực <b>“'+esc(lvs[0])+'”</b> ở tab Nhập liệu.</div>';
  return '';
}

/* Số trẻ đỡ đầu: đếm từ Danh sách các cháu đỡ đầu (tab Danh sách đỡ đầu) theo đơn vị */
function dodauCount(unit){ return DODAU.filter(m=>!unit||m.don_vi===unit).length; }
/* Ánh xạ 4 tiêu chí tỷ lệ (%) sang LĨNH VỰC hoạt động ở tab Nhập liệu.
   Nếu đơn vị có ít nhất 1 hoạt động thuộc lĩnh vực tương ứng (trong năm) => tiêu chí đạt 100% (bằng chỉ tiêu đã phân bổ).
   (Muốn đổi lĩnh vực cho từng tiêu chí, chỉ cần sửa danh sách LINH_VUC[...] bên dưới.) */
function pctCritLV(c){
  if(!isPctCrit(c)) return null;
  const n=String(c&&c.name||"").toLowerCase();
  if(/tuyên truyền|nghị quyết|chính sách|pháp luật/.test(n)) return [LINH_VUC[0]]; // Giáo dục chính trị, tư tưởng, tuyên truyền
  if(/kiểm tra|đánh giá|quán triệt|học tập/.test(n))          return [LINH_VUC[0]]; // Giáo dục chính trị, tư tưởng (học tập, quán triệt)
  if(/năng lực số|khoa học công nghệ|chuyển đổi số/.test(n))  return [LINH_VUC[5]]; // Đồng hành với thanh niên (học tập, ngoại ngữ, năng lực số)
  if(/ngoại ngữ/.test(n))                                     return [LINH_VUC[5]]; // Đồng hành với thanh niên (học tập, ngoại ngữ, năng lực số)
  return null;
}
/* Có hoạt động nào thuộc các lĩnh vực đã cho (theo đơn vị & năm) không? */
function hasActInLV(unit,year,lvs){
  return ACT.some(a=>(!unit||a.don_vi===unit)&&(!year||String(num(a.nam||2026))===String(year))&&lvs.some(lv=>String(a.linh_vuc||"")===lv));
}
/* Chỉ tiêu đã phân bổ của tiêu chí (dùng để quy về 100% khi đạt) */
function critTargetVal(c,unit,year){
  if(unit) return num(unitTargets(unit,year).map[c.key]);
  const ot=overallTargets(year).map; let v=num(ot[c.key]);
  if(!v) v=DON_VI.slice(1).reduce((s,dv)=>s+num(unitTargets(dv,year).map[c.key]),0);
  return v;
}
function unitMemberTotal(unit){
  if(!unit) return DON_VI.slice(1).reduce((s,dv)=>s+(num(getProfile(dv).so_doan_vien)||MEMBERS.filter(m=>m.don_vi===dv).length),0);
  return num(getProfile(unit).so_doan_vien)||MEMBERS.filter(m=>m.don_vi===unit).length;
}
/* Giá trị THỰC HIỆN của một tiêu chí:
   - Xếp loại HTXS: đếm từ Danh sách đoàn viên
   - Đỡ đầu: đếm từ Danh sách các cháu đỡ đầu
   - Tiêu chí %: nếu có hoạt động thuộc lĩnh vực tương ứng => đạt 100% (bằng chỉ tiêu), ngược lại 0
   - Còn lại (định lượng): lấy số đã nhập tay từ hoạt động */
/* Quy một tiêu chí (kể cả tiêu chí Quản trị tự thêm / đã đổi tên) về ĐÚNG cột số liệu ở tab Nhập liệu.
   Nhờ đó số Thực hiện luôn lấy từ dữ liệu các chi đoàn đã nhập, dù tiêu chí là mặc định hay tự thêm. */
const CONCEPT_KEYS=["luot","khcn","sang_kien","cay","bien","dang"];
function critConceptKey(c){
  if(!c) return null;
  if(CONCEPT_KEYS.indexOf(c.key)>=0) return c.key;          // đã là tiêu chí mặc định
  const n=String(c.name||"").toLowerCase();
  if(/biên giới/.test(n)) return "bien";                    // Công trình/hoạt động biên giới
  if(/giới thiệu|kết nạp|ưu tú|đvưt/.test(n) && /đảng/.test(n)) return "dang"; // Giới thiệu ĐVƯT cho Đảng
  if(/cây xanh|trồng.*cây/.test(n)) return "cay";           // Trồng mới cây xanh
  if(/sáng kiến/.test(n)) return "sang_kien";               // Sáng kiến
  if(/công trình|khoa học|công nghệ|khcn|chuyển đổi số/.test(n)) return "khcn"; // Công trình KHCN, CĐS
  if(/số lượt|lượt đoàn viên|lượt đv|tình nguyện/.test(n)) return "luot";       // Lượt ĐV, TN tham gia tình nguyện
  return null;
}
function critActual(c,g,unit,year){
  if(isHTXSCrit(c)) return htxsCount(unit,year);   // Xếp loại HTXS: tự đếm từ Danh sách đoàn viên
  if(isDoDauCrit(c)) return dodauCount(unit);      // Đỡ đầu: tự đếm từ Danh sách các cháu đỡ đầu (kể cả tiêu chí tự thêm)
  if(isPctCrit(c)){                                 // Tiêu chí %: phân bổ theo quân số (phần được giao)
    const lvs=pctCritLV(c);
    if(lvs){
      if(unit) return hasActInLV(unit,year,lvs) ? critTargetVal(c,unit,year) : 0; // 1 đơn vị: đạt = trọn phần được giao
      // Toàn Đoàn: cộng phần được giao của các chi đoàn ĐÃ tổ chức → đủ 8 đơn vị = 100%
      return DON_VI.slice(1).reduce((s,dv)=> s + (hasActInLV(dv,year,lvs) ? num(unitTargets(dv,year).map[c.key]) : 0), 0);
    }
  }
  const ck=critConceptKey(c);                       // Định lượng: lấy tổng đúng cột ở tab Nhập liệu
  if(ck==="luot") return g.luot_all||0;             // "Lượt ĐV, TN tham gia" = tổng toàn bộ cột (không lọc lĩnh vực)
  if(ck) return g[ck]||0;
  return g[c.key]||0;
}
/* CHIA SỐNG tiêu chí tỷ lệ %: phần được giao của mỗi chi đoàn = tỷ lệ quân số hiện thời,
   tự tính lại từ Danh sách đoàn viên mỗi lần mở trang (số nguyên, cộng đúng 100). */
function pctShareMap(){
  const units=DON_VI.slice(1);
  const counts=units.map(dv=>({dv,n:unitMemberTotal(dv)}));
  const total=counts.reduce((s,x)=>s+x.n,0);
  const map={};
  if(!total){ units.forEach(dv=>map[dv]=0); return map; }
  const raw=counts.map(x=>x.n/total*100);
  const share=counts.map((x,i)=>Math.floor(raw[i]));
  let need=100-share.reduce((s,v)=>s+v,0);
  const ord=counts.map((x,i)=>i).sort((a,b)=>(raw[b]-Math.floor(raw[b]))-(raw[a]-Math.floor(raw[a])));
  for(let k=0;k<need;k++) share[ord[k]]++;
  counts.forEach((x,i)=>map[x.dv]=share[i]);
  return map;
}
function unitTargets(don_vi,year){
  const row=TARGETS.find(t=>t.don_vi===don_vi&&String(t.nam)===String(year));
  const ex=parseExtra(row);
  const map={}; allCrit().forEach(ct=>map[ct.key]= row ? (ct.custom?num(ex[ct.key]):num(row[ct.key])) : 0);
  const ps=pctShareMap();                                    // % chia sống theo quân số hiện thời
  allCrit().forEach(ct=>{ if(isPctCrit(ct)) map[ct.key]=num(ps[don_vi]); });
  return {map,has:!!row,row};
}
/* Chỉ tiêu chung toàn Đoàn — số đã lưu (dùng cho bảng Phân bổ) */
function overallTargets(year){
  const row=TARGETS.find(t=>t.don_vi===DON_VI[0]&&String(t.nam)===String(year));
  const ex=parseExtra(row);
  const map={}; allCrit().forEach(ct=>map[ct.key]= row ? (ct.custom?num(ex[ct.key]):num(row[ct.key])) : (ct.custom?0:ct.target));
  allCrit().forEach(ct=>{ if(isPctCrit(ct)) map[ct.key]=100; });  // toàn Đoàn của tiêu chí % luôn = 100
  return {map,has:!!row,row};
}
function currentTargets(){
  const u=Store.user;
  if(u&&u.role==="admin"){
    const ot=overallTargets(curYear).map, units=DON_VI.slice(1), map={};
    allCrit().forEach(ct=>{
      let v=ot[ct.key];
      if(!v){ v=units.reduce((s,dv)=>s+num(unitTargets(dv,curYear).map[ct.key]),0); } // chưa đặt chỉ tiêu chung -> lấy tổng đã phân bổ
      map[ct.key]=v;
    });
    return {map,has:true,admin:true};
  }
  return Object.assign({admin:false},unitTargets(u?u.don_vi:"",curYear));
}

function mcCell(mc){
  if(!mc) return "";
  const parts=String(mc).split("|").map(s=>s.trim()).filter(Boolean);
  return parts.map(url=>/^https?:\/\//i.test(url)
    ? `<a class="mclink" href="${esc(url)}" target="_blank" rel="noopener">${IC.link}Xem minh chứng</a>`
    : `<div class="mcplain">${IC.clip}${esc(url)}</div>`).join("");
}

    const pages=Math.max(1,Math.ceil(rows.length/entrySize)); if(entryPage>pages) entryPage=pages;
    const pageRows=rows.slice((entryPage-1)*entrySize, entryPage*entrySize);
    const t=el("table","acttbl");t.style.minWidth=(1180+ACT_COLS.length*82)+"px";
    t.innerHTML=`<thead><tr>
      <th class="num">STT</th><th>Đơn vị</th><th class="num">Năm</th><th class="num">Tháng</th><th class="num">Ngày tổ chức</th>
      <th style="min-width:170px">Tên hoạt động / sự kiện</th><th>Lĩnh vực</th><th>Hình thức tổ chức</th>
      ${ACT_COLS.map(c=>`<th style="text-align:center;vertical-align:middle;white-space:normal;word-break:break-word;min-width:80px">${c.h}</th>`).join("")}
      <th style="min-width:280px">Nội dung chi tiết hoạt động</th><th>Minh chứng / Link</th><th></th>
    </tr></thead>`;
    const tbody=el("tbody");
    pageRows.forEach((a,i)=>{
      const canEdit=isAdmin||a.don_vi===u.don_vi;
      const tr=el("tr");
      tr.innerHTML=`<td class="num">${(entryPage-1)*entrySize+i+1}</td>
        <td>${esc(a.don_vi)}</td>
        <td class="num">${esc(a.nam||2026)}</td><td class="num">Tháng ${esc(a.thang)}</td>
        <td class="num">${a.ngay?esc(fmtDMY(a.ngay)):"–"}</td>
        <td><b>${esc(a.ten)}</b></td>
        <td><span class="tag">${esc((a.linh_vuc||"").split("(")[0])}</span></td>
        <td style="font-size:12.5px">${esc(a.hinh_thuc)||"–"}</td>
        ${ACT_COLS.map(c=>`<td style="text-align:center;font-variant-numeric:tabular-nums">${a[c.k]?fmt(a[c.k]):"–"}</td>`).join("")}
        <td style="font-size:12.5px;min-width:280px;white-space:normal;line-height:1.4">${esc(a.ket_qua)||'<span style="color:var(--muted)">–</span>'}</td>
        <td>${a.minh_chung?mcCell(a.minh_chung):'<span style="color:var(--muted)">–</span>'}</td>
        <td></td>`;
      const act=el("div","rowact");
      if(canEdit){
        const e=el("button","iconbtn",IC.edit+"Sửa");e.onclick=()=>openForm(a);
        const d=el("button","iconbtn del",IC.trash+"Xóa");d.onclick=()=>delRow(a);
        act.appendChild(e);act.appendChild(d);
      }else act.innerHTML='<span style="color:var(--muted);font-size:12px">—</span>';
      tr.lastChild.appendChild(act);
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);scroll.appendChild(t);
    renderPager(pager,rows.length,entryPage,entrySize,p=>{entryPage=p;refresh();window.scrollTo(0,0);},sz=>{entrySize=sz;entryPage=1;refresh();});
  }
  refresh();
  return box;
}

async function delRow(a){
  if(!confirm(`Xóa hoạt động “${a.ten}”?`))return;
  try{await Store.remove(a.id);toast("Đã xóa hoạt động.","ok");await reload();}
  catch(e){toast("Không xóa được: "+e.message,"bad");}
}

  const gridCrits=allCrit().filter(c=>!isHTXSCrit(c) && c.key!=="luot"); // HTXS tự đếm từ đoàn viên; "luot" đã có ô "Số ĐV, TN tham gia"
  const critInputHTML=c=>{

    return `<div><label>${esc(formLabel(c))}${c.unit?` <span style="color:var(--muted)">(${esc(c.unit)})</span>`:""}</label><input id="${id}" type="text" inputmode="numeric" class="numgrp" value="${val}" placeholder="0"></div>`;

  const numField=(key,extra="")=>{const f=NF[key];return `<div><label>${f.label}</label><input id="f_${f.key}" type="text" inputmode="numeric" class="numgrp" value="${o[f.key]===0||o[f.key]===""||o[f.key]==null?"":groupVN(o[f.key])}" placeholder="0">${extra}</div>`;};
  const root=$("#modalRoot");
  root.innerHTML=`<div class="modal-bg"><div class="modal">
    <div class="modal-head"><span>${edit?"Chỉnh sửa hoạt động":"Thêm hoạt động mới"}</span><button class="x" id="f_close">×</button></div>
    <div class="form-grid">
      <div class="formsec">1. Thông tin hoạt động</div>

      <div class="req"><label>Năm thực hiện</label><select id="f_nam">${yearOpts}</select></div>
      <div class="req"><label>Tháng thực hiện</label><select id="f_thang">${monthOpts}</select></div>
      <div><label>Ngày tổ chức</label><input id="f_ngay" type="date" value="${esc(toDateInput(o.ngay))}"></div>
      <div class="req full"><label>Tên hoạt động / sự kiện</label><input id="f_ten" value="${esc(o.ten)}" placeholder="Ví dụ: Chương trình Xuân tình nguyện năm 2026"></div>
      <div><label>Lĩnh vực / Nhóm hoạt động</label><select id="f_linh_vuc">${opts(LINH_VUC,o.linh_vuc)}</select></div>
      <div><label>Hình thức tổ chức</label><select id="f_hinh_thuc">${opts(HINH_THUC,o.hinh_thuc)}</select></div>

      <div class="formsec">2. Số liệu kết quả <span>— nhập trực tiếp con số kết quả của hoạt động vào từng ô</span></div>
      <div class="full"><div class="hint" style="margin:0 0 8px">Điền số kết quả của hoạt động vào các ô bên dưới — phần mềm <b>tự cộng vào đúng chỉ tiêu</b> ở tab <b>Đối chiếu chỉ tiêu</b>. Ô nào không phát sinh thì để trống (0). Kinh phí nhập theo đồng (ví dụ 1.000.000). <i>(Số trẻ “đỡ đầu” lấy từ tab Danh sách các cháu đỡ đầu, không nhập ở đây.)</i></div></div>
      <div class="numgroup full">${FORM_NUM_ORDER.map(k=>numField(k)).join("")}</div>
      <div class="full"><label>Nội dung chi tiết hoạt động</label><textarea id="f_ket_qua" rows="3" placeholder="Tóm tắt nội dung hoạt động/tên sáng kiến/tên công trình cụ thể để phục vụ báo cáo">${esc(o.ket_qua)}</textarea></div>

      <div class="formsec">3. Minh chứng &amp; Link</div>
      <div class="full"><label>Minh chứng / Đường dẫn (ảnh hoạt động)</label><input id="f_minh_chung" value="${esc(o.minh_chung)}" placeholder="Dán đường dẫn, hoặc dán/chọn ảnh bên dưới">
        <div id="f_mc_list" style="display:none;flex-wrap:wrap;gap:8px;margin-top:8px"></div>
        <div id="f_mc_drop" tabindex="0" style="margin-top:8px;border:2px dashed var(--line);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s;outline:none">
          <div style="font-size:13px;color:var(--muted)">📋 <b>Bấm vào ô này rồi dán ảnh (Ctrl&nbsp;+&nbsp;V)</b> — có thể dán nhiều ảnh</div>
          <input type="file" id="f_mc_file" accept="image/*" multiple style="display:none">
          <div style="margin-top:8px"><button type="button" class="btn btn-ghost btn-sm" id="f_mc_up">⬆ Hoặc chọn ảnh từ máy</button> <span id="f_mc_status" style="font-size:12px;color:var(--muted)"></span></div>
        </div>
        <div class="hint">Ảnh lưu trên Google Drive theo thư mục: <b>đơn vị</b> → <b>“ngày_tên hoạt động”</b> (ví dụ <i>2026.03.01_Ra quân tình nguyện</i>). Vì vậy hãy <b>nhập Tên hoạt động và Ngày trước khi tải ảnh</b>. Link tự điền vào ô trên; nhiều ảnh ngăn nhau bằng dấu " | ".</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="f_cancel">Hủy</button>
      <button class="btn btn-primary" id="f_save">${edit?"Lưu thay đổi":"Thêm hoạt động"}</button>
    </div>
  </div></div>`;
  const close=()=>root.innerHTML="";
  root.querySelectorAll(".numgrp").forEach(attachThousand);
  $("#f_close").onclick=close;$("#f_cancel").onclick=close;
  const mcUp=$("#f_mc_up"), mcFile=$("#f_mc_file"), mcStatus=$("#f_mc_status"), mcInput=$("#f_minh_chung"), mcDrop=$("#f_mc_drop"), mcList=$("#f_mc_list");
  // Hiển thị các ảnh/đường dẫn đã lưu thành ô xem trước, mỗi ô có nút ✕ để bỏ
  const driveId=u=>{const m=String(u).match(/\/d\/([-\w]{20,})/)||String(u).match(/[?&]id=([-\w]{20,})/)||String(u).match(/[-\w]{25,}/);return m?(m[1]||m[0]):"";};
  function renderMcChips(){
    if(!mcList) return;
    const urls=mcInput.value.split("|").map(s=>s.trim()).filter(Boolean);
    mcList.style.display = urls.length ? "flex" : "none";
    mcList.innerHTML = urls.map((u,i)=>{
      const id=driveId(u);
      const media = id
        ? `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w160" alt="Ảnh ${i+1}" style="width:100%;height:100%;object-fit:cover">`
        : `<div style="padding:6px;font-size:10.5px;color:var(--muted);word-break:break-all;line-height:1.3">Đường dẫn ${i+1}</div>`;
      return `<div style="position:relative;width:86px;height:86px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#F7F8FA;flex:0 0 auto">
        <a href="${esc(u)}" target="_blank" rel="noopener" title="Mở ảnh/đường dẫn" style="display:block;width:100%;height:100%;text-decoration:none">${media}</a>
        <button type="button" class="mcdel" data-i="${i}" title="Bỏ ảnh này khỏi hoạt động" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(192,57,43,.92);color:#fff;font-weight:700;font-size:14px;line-height:18px;padding:0;cursor:pointer">×</button>
      </div>`;
    }).join("");
    mcList.querySelectorAll("img").forEach(img=>{ img.onerror=()=>{ img.parentNode.innerHTML='<div style="padding:6px;font-size:10.5px;color:var(--muted);line-height:1.3">Ảnh (bấm để xem)</div>'; }; });
    mcList.querySelectorAll(".mcdel").forEach(b=>b.onclick=()=>{
      const i=+b.getAttribute("data-i");
      const arr=mcInput.value.split("|").map(s=>s.trim()).filter(Boolean);
      arr.splice(i,1); mcInput.value=arr.join(" | "); renderMcChips();
    });
  }
  mcInput.addEventListener("input",renderMcChips);
  renderMcChips();
  async function uploadImages(fileList){
    let files=Array.from(fileList||[]).filter(f=>/^image\//.test(f.type||""));
    if(!files.length){ if(mcStatus){mcStatus.style.color="#C0392B";mcStatus.textContent="Chưa có ảnh hợp lệ.";} return; }
    const big=files.find(f=>f.size>10*1024*1024);
    if(big){ mcStatus.style.color="#C0392B"; mcStatus.textContent="Có ảnh > 10MB, hãy chọn ảnh nhỏ hơn."; return; }
    // Thông tin để sắp thư mục trên Google Drive: đơn vị + "yyyy.MM.dd_tên hoạt động"
    const gv=id=>{const e=document.getElementById(id);return e?String(e.value||"").trim():"";};
    const actUnit = gv("f_dv") || o.don_vi || "";
    const actName = gv("f_ten") || (o.ten||"");
    if(!actName){ if(mcStatus){mcStatus.style.color="#C0392B";mcStatus.textContent="Hãy nhập TÊN HOẠT ĐỘNG (và Ngày tổ chức) trước khi tải ảnh — để ảnh lưu đúng thư mục trên Drive.";} return; }
    const ngay=gv("f_ngay"), nam=gv("f_nam")||o.nam||curYear, thang=gv("f_thang")||o.thang||"";
    const pad=n=>String(n).padStart(2,"0");
    const dstr = /^\d{4}-\d{2}-\d{2}$/.test(ngay) ? ngay.replace(/-/g,".") : (String(nam)+(thang?("."+pad(thang)):""));
    const subFolder = dstr + "_" + actName;
    try{
      if(mcUp) mcUp.disabled=true; let done=0;
      for(const file of files){
        mcStatus.style.color="var(--muted)"; mcStatus.textContent=`Đang xử lý ${done+1}/${files.length}…`;
        const c=await compressImage(file);   // nén/giảm kích thước phía trình duyệt cho nhẹ và nhanh
        const data=c?c.data:await new Promise((res,rej)=>{const r=new FileReader();r.onerror=()=>rej(new Error("Đọc tệp lỗi"));r.onload=()=>res(String(r.result).split(",")[1]);r.readAsDataURL(file);});
        mcStatus.textContent=`Đang tải ${done+1}/${files.length}…`;
        const d=await Store.uploadFile({name:(c&&c.name)||file.name||("anh_dan_"+Date.now()+".jpg"),mime:(c&&c.mime)||file.type||"image/jpeg",data,don_vi:actUnit,sub:subFolder});
        if(d&&d.url){ mcInput.value = mcInput.value.trim() ? (mcInput.value.trim()+" | "+d.url) : d.url; done++; renderMcChips(); }
      }
      mcStatus.style.color="#1e7a46"; mcStatus.textContent=`Đã tải lên ${done} ảnh vào Drive.`;
    }catch(e){ mcStatus.style.color="#C0392B"; mcStatus.textContent="Tải lên thất bại: "+e.message; }
    finally{ if(mcUp) mcUp.disabled=false; if(mcFile) mcFile.value=""; }
  }
  if(mcFile) mcFile.onchange=()=>uploadImages(mcFile.files);
  if(mcUp) mcUp.onclick=(e)=>{ e.stopPropagation(); mcFile&&mcFile.click(); };
  if(mcDrop){
    mcDrop.onclick=()=>mcDrop.focus();
    const hi=on=>{ mcDrop.style.background=on?"rgba(10,92,168,.06)":""; mcDrop.style.borderColor=on?"var(--red)":"var(--line)"; };
    ["dragenter","dragover"].forEach(ev=>mcDrop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();hi(true);}));
    ["dragleave","dragend"].forEach(ev=>mcDrop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();hi(false);}));
    mcDrop.addEventListener("drop",e=>{e.preventDefault();e.stopPropagation();hi(false); if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length) uploadImages(e.dataTransfer.files);});
    mcDrop.addEventListener("focus",()=>{ hi(true); if(mcStatus&&!mcStatus.textContent){ mcStatus.style.color="var(--muted)"; mcStatus.textContent="Sẵn sàng — bấm Ctrl+V để dán ảnh."; } });
    mcDrop.addEventListener("blur",()=>hi(false));
  }
  // Dán ảnh từ clipboard (Ctrl+V) — lấy ảnh trong bộ nhớ tạm rồi tải lên Drive
  function pasteImages(e){
    const items=(e.clipboardData&&e.clipboardData.items)||[];
    const files=[];
    for(const it of items){ if(it.kind==="file" && /^image\//.test(it.type||"")){ const f=it.getAsFile(); if(f) files.push(f); } }
    if(files.length){ e.preventDefault(); e.stopPropagation(); uploadImages(files); }
  }
  if(mcDrop) mcDrop.addEventListener("paste",pasteImages);
  const modalEl=root.firstElementChild; if(modalEl) modalEl.addEventListener("paste",pasteImages);
  $("#f_save").onclick=async()=>{
    const g=id=>{const e=$("#"+id);return e?e.value:"";};
    const rec=Object.assign({},o,{
      nam:parseInt(g("f_nam")), don_vi:isAdmin?g("f_dv"):u.don_vi, thang:parseInt(g("f_thang")), ngay:g("f_ngay"),
      ten:g("f_ten").trim(), linh_vuc:g("f_linh_vuc"), hinh_thuc:g("f_hinh_thuc"),
      ket_qua:g("f_ket_qua").trim(), minh_chung:g("f_minh_chung").trim()
    });
    FORM_NUM_ORDER.forEach(k=>{ const elx=document.getElementById("f_"+k); if(elx) rec[k]=num(ungroup(elx.value)); });
    // giữ nguyên cột extra (tiêu chí tự thêm) của bản ghi cũ, không đụng tới
    rec.extra=o.extra||rec.extra||"";
    if(!rec.ten){toast("Vui lòng nhập Tên hoạt động.","bad");return;}
    try{
      $("#f_save").disabled=true;$("#f_save").textContent="Đang lưu…";
      if(edit) await Store.update(rec); else await Store.add(rec);
      close();toast(edit?"Đã lưu thay đổi.":"Đã thêm hoạt động.","ok");await reload();
    }catch(e){toast("Lưu thất bại: "+e.message,"bad");$("#f_save").disabled=false;$("#f_save").textContent=edit?"Lưu thay đổi":"Thêm hoạt động";}
  };
}

function viewDoiChieu(){
  const u=Store.user;
  const box=el("div");
  box.appendChild(el("div","pagehead",`<div><h2>Đối chiếu kết quả thực hiện chỉ tiêu năm ${curYear}</h2><p>${u.role==="admin"?"Lũy kế đến hết kỳ · so với chỉ tiêu năm của toàn Đoàn Chi cục.":"Lũy kế đến hết kỳ · so với chỉ tiêu được Đoàn Chi cục phân bổ cho đơn vị."}</p></div>`));
  const pbWrap=el("div");pbWrap.style.marginBottom="16px";pbWrap.appendChild(periodBar(()=>render()));box.appendChild(pbWrap);
  const g=aggregate(curPeriod);
  const T=currentTargets();
  if(!T.admin && !T.has) box.appendChild(el("div","banner",`<b>ℹ</b><div>Đoàn Chi cục chưa phân bổ chỉ tiêu năm ${curYear} cho đơn vị của bạn.</div>`));
  const card=el("div","card");const scroll=el("div","tablescroll");
  const t=el("table");
  t.innerHTML=`<thead><tr><th>Chỉ tiêu</th><th class="num">${T.admin?"Chỉ tiêu năm":"Được phân bổ"}</th><th class="num">Thực hiện</th><th class="num">Tỷ lệ</th><th>Đánh giá</th></tr></thead>`;
  const tbody=el("tbody");
  allCrit().forEach(ct=>{
    const tgt=T.map[ct.key], val=critActual(ct,g,(Store.user.role==="admin"?null:Store.user.don_vi),curYear),p=tgt?val/tgt:0;
    const lv=p>=1?["var(--green)","var(--green-soft)","Đạt"]:p>=0.7?["var(--amber)","var(--amber-soft)","Gần đạt"]:["var(--red-text)","var(--red-soft)","Chưa đạt"];
    const tr=el("tr");
    tr.innerHTML=`<td><b>${esc(ct.name)}</b> <span style="color:var(--muted)">(${esc(ct.unit||"")})</span>${critNote(ct)}</td>
      <td class="num" style="color:var(--green)">${fmt(tgt)}</td>
      <td class="num"><b>${fmt(val)}</b></td>
      <td class="num" style="color:${lv[0]};font-weight:800">${(p*100).toFixed(1)}%</td>
      <td><span style="background:${lv[1]};color:${lv[0]};font-weight:700;font-size:12px;padding:3px 10px;border-radius:99px">${lv[2]}</span></td>`;
    tbody.appendChild(tr);
  });
  t.appendChild(tbody);scroll.appendChild(t);card.appendChild(scroll);box.appendChild(card);
  box.appendChild(el("div","banner",'<b>ℹ</b><div>Các tiêu chí do Đoàn Chi cục thêm (ví dụ nhóm tỷ lệ %) được giao chỉ tiêu ở tab <b>Phân bổ chỉ tiêu</b> và theo dõi tiến độ tại đây. Riêng <b>“Đỡ đầu”</b> lấy số từ tab <b>Danh sách các cháu đỡ đầu</b>, <b>“Xếp loại HTXS”</b> lấy từ tab <b>Danh sách đoàn viên</b>.</div>'));
  return box;
}

    else lines.push(`(${i+1}) ${ct.tpl(fmt(val),fmt(tgt))} (đạt ${pctVN(p)}%).`);
  });
  const text=lines.join("\n");
  const rep=el("div","report");
  rep.innerHTML=`<div class="lead">${esc(lines[0])}</div>`+lines.slice(1).map(l=>esc(l)).join("\n");
  box.appendChild(rep);

  return box;
}

/* ---------- XUẤT EXCEL (có kẻ ô, tiêu đề đơn vị) ---------- */
function exportTableXLS(filename,unitLine,title,subtitle,cols,rows){
  const N=cols.length;
  const e2=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const thS="border:1px solid #234;background:#0A5CA8;color:#fff;font-weight:bold;padding:6px 8px;text-align:center;mso-number-format:'\\@'";
  const tdS="border:1px solid #999;padding:4px 8px;vertical-align:top";
  const sub=(unitLine?("Đơn vị: "+unitLine+(subtitle?" · ":"")):"")+(subtitle||"");
  let h='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><style>td,th{font-family:\'Times New Roman\',serif;font-size:12pt}</style></head><body>';
  h+='<table border="1" style="border-collapse:collapse">';
  h+=`<tr><td colspan="${N}" style="border:none;font-weight:bold;font-size:14pt;text-align:center">${e2(title)}</td></tr>`;
  if(sub) h+=`<tr><td colspan="${N}" style="border:none;font-style:italic;text-align:center">${e2(sub)}</td></tr>`;
  h+=`<tr><td colspan="${N}" style="border:none">&nbsp;</td></tr>`;
  h+='<tr>'+cols.map(c=>`<th style="${thS}">${e2(c.h)}</th>`).join('')+'</tr>';
  rows.forEach((r,i)=>{
    h+='<tr>'+cols.map(c=>{
      let v = c.k==="__stt" ? (i+1) : r[c.k];
      if(c.f) v=c.f(v);
      if(c.num){ const n=ungroup(v); return `<td style="${tdS};text-align:right;mso-number-format:'\\#\\,\\#\\#0'">${n===""?"":num(n)}</td>`; }
      return `<td style="${tdS};mso-number-format:'\\@'">${e2(v)}</td>`;
    }).join('')+'</tr>';
  });
  h+='</table></body></html>';
  const blob=new Blob(["\uFEFF"+h],{type:"application/vnd.ms-excel;charset=utf-8"});
  const a=el("a");a.href=URL.createObjectURL(blob);a.download=filename+"_"+new Date().toISOString().slice(0,10)+".xls";a.click();
  toast("Đã xuất file Excel.","ok");
}
function exportActivities(rows,meta){
  const cols=[{h:"TT",k:"__stt"},{h:"Năm",k:"nam"},{h:"Tháng",k:"thang",f:v=>v?("T"+v):""},{h:"Ngày tổ chức",k:"ngay",f:fmtDMY}]
    .concat(meta.showUnitCol?[{h:"Đơn vị",k:"don_vi"}]:[])
    .concat([{h:"Tên hoạt động",k:"ten"},{h:"Lĩnh vực",k:"linh_vuc"},{h:"Hình thức tổ chức",k:"hinh_thuc"}])
    .concat(ACT_COLS.map(c=>({h:c.h,k:c.k,num:true})))
    .concat([{h:"Nội dung chi tiết hoạt động",k:"ket_qua"},{h:"Minh chứng",k:"minh_chung"}]);
  exportTableXLS("hoat_dong_doan_hqkv8",meta.unitLine,"BẢNG THEO DÕI HOẠT ĐỘNG CÔNG TÁC ĐOÀN",meta.subtitle,cols,rows);
}

const normHeader=s=>String(s==null?"":s).toLowerCase().replace(/\s+/g," ").trim();
function cellVal(v){
  if(v==null) return "";
  if(v instanceof Date){ const y=v.getFullYear(),m=("0"+(v.getMonth()+1)).slice(-2),d=("0"+v.getDate()).slice(-2); return `${y}-${m}-${d}`; }
  return String(v);
}
function csvTo2D(text){
  const rows=[];let i=0,field="",row=[],inQ=false;
  text=String(text).replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  while(i<text.length){const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue;} field+=c;i++;continue; }
    if(c==='"'){inQ=true;i++;continue;}
    if(c===','){row.push(field);field="";i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=c;i++;
  }
  if(field!==""||row.length){row.push(field);rows.push(row);}
  return rows;
}
async function readSheetFile(file){
  const name=file.name.toLowerCase();
  if(name.endsWith(".csv")) return csvTo2D(await file.text());
  if(typeof XLSX==="undefined") throw new Error("Chưa tải được bộ đọc Excel (cần mạng). Bạn có thể lưu file dạng CSV rồi nhập lại.");
  const wb=XLSX.read(await file.arrayBuffer(),{type:"array",cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{header:1,raw:true,cellDates:true,defval:""});
}

    const cells=(rows2D[r]||[]).map(normHeader); const ci={}; let cnt=0;
    Object.keys(map).forEach(f=>{
      for(let c=0;c<cells.length;c++){ if(cells[c] && map[f].some(al=>cells[c]===al||cells[c].startsWith(al))){ if(ci[f]==null){ci[f]=c;cnt++;} break; } }
    });
    if(cnt>best){best=cnt;hIdx=r;colIdx=ci;}
  }
  if(hIdx<0||best<2||colIdx.ho_ten==null) throw new Error("Không nhận diện được cột trong file. Cần có dòng tiêu đề (Họ tên, …).");
  const recs=[];
  for(let r=hIdx+1;r<rows2D.length;r++){
    const row=rows2D[r]; if(!row) continue;
    const get=f=>colIdx[f]==null?"":cellVal(row[colIdx[f]]);
    const ho_ten=get("ho_ten").trim(); if(!ho_ten) continue;
    const rec={};
    Object.keys(map).forEach(f=>{ if(f==="__unit") return; rec[f]=get(f).trim(); });
    if(kind==="DoanVien" && rec.dang_vien) rec.dang_vien=(rec.dang_vien.toLowerCase().indexOf("x")>=0||rec.dang_vien.toLowerCase().indexOf("có")>=0)?"x":"";
    const rawUnit=get("__unit"); if(rawUnit) rec.don_vi=normalizeUnitName(rawUnit);
    recs.push(rec);
  }
  return recs;
}
function openImport(kind){
  const u=Store.user, isAdmin=u.role==="admin";
  const label=kind==="DoanVien"?"đoàn viên":"đỡ đầu";
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=".xlsx,.xls,.csv"; inp.style.display="none";
  document.body.appendChild(inp);
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; document.body.removeChild(inp);
    if(!file) return;
    try{
      toast("Đang đọc file…","ok");
      const rows2D=await readSheetFile(file);
      let recs=buildImportRecords(kind,rows2D);
      if(!recs.length){toast("Không tìm thấy dòng dữ liệu hợp lệ trong file.","bad");return;}
      if(!isAdmin) recs.forEach(r=>{delete r.don_vi;}); // chi đoàn: khóa về đơn vị mình
      const unresolved=isAdmin?recs.filter(r=>r.don_vi&&DON_VI.indexOf(r.don_vi)<0).length:0;
      let msg=`Đã đọc ${recs.length} dòng ${label}. Nhập tất cả vào danh sách?`;
      if(isAdmin&&unresolved>0) msg+=`\n(Lưu ý: ${unresolved} dòng chưa khớp tên đơn vị chuẩn — vẫn nhập, bạn có thể sửa lại sau.)`;
      if(!isAdmin) msg+=`\nTất cả sẽ được thêm vào đơn vị: ${u.don_vi}.`;
      if(!confirm(msg)) return;
      toast("Đang nhập dữ liệu…","ok");
      const n=await Store.bulkAdd(kind,recs);
      toast(`Đã nhập ${n} ${label} vào danh sách.`,"ok");
      await reload();
    }catch(e){ toast("Nhập thất bại: "+e.message,"bad"); }
  };
  inp.click();
}

/* Đọc danh sách Ban Chấp hành / cán bộ (Họ tên + Chức danh) từ file cho tab Hồ sơ */
function parseRosterRows(rows2D){
  const aliasName=["họ và tên","họ tên","ho ten","hoten","họ và tên đồng chí","họ tên đồng chí","tên"];
  const aliasRole=["chức danh","chuc danh","chức danh đoàn thể","chức vụ","chuc vu","chức danh/chức vụ","chức vụ đoàn thể"];
  let hIdx=-1,cName=-1,cRole=-1;
  for(let r=0;r<Math.min(rows2D.length,20);r++){
    const cells=(rows2D[r]||[]).map(normHeader); let n=-1,ro=-1;
    for(let c=0;c<cells.length;c++){
      if(n<0 && cells[c] && aliasName.some(a=>cells[c]===a||cells[c].startsWith(a))) n=c;
      if(ro<0 && cells[c] && aliasRole.some(a=>cells[c]===a||cells[c].startsWith(a))) ro=c;
    }
    if(n>=0){ hIdx=r; cName=n; cRole=ro; break; }
  }
  if(hIdx<0) throw new Error("Không nhận diện được cột “Họ và tên” trong file. Cần có dòng tiêu đề (Họ và tên, Chức danh).");
  const out=[];
  for(let r=hIdx+1;r<rows2D.length;r++){
    const row=rows2D[r]; if(!row) continue;
    const ho=String(cellVal(row[cName])||"").trim(); if(!ho) continue;
    const cd=cRole>=0?String(cellVal(row[cRole])||"").trim():"";
    out.push({ho_ten:ho, chuc_danh:cd});
  }
  return out;
}

/* Hộp thoại thêm/sửa dùng chung cho Đoàn viên & Đỡ đầu */
function openListForm(opts){
  const {title,fields,rec,isAdmin,lockUnit,saver}=opts;
  const o=Object.assign({},rec);
  const edit=!!o.id;
  const unitField = isAdmin
    ? `<div class="full"><label>Đơn vị / Chi đoàn</label><select id="lf_dv">${DON_VI.map(d=>`<option ${d===(o.don_vi||lockUnit)?"selected":""}>${esc(d)}</option>`).join("")}</select></div>`
    : `<div class="full"><label>Đơn vị / Chi đoàn</label><input value="${esc(lockUnit)}" disabled style="background:#F3F4F6"></div>`;
  const fieldHTML=fields.map(f=>{
    const w=f.w==="full"?" full":"";
    const v=o[f.key]==null?"":o[f.key];
    let inner;
    if(f.type==="select") inner=`<select id="lf_${f.key}">${f.opts.map(x=>`<option ${String(x)===String(v)?"selected":""}>${esc(x)}</option>`).join("")}</select>`;
    else if(f.type==="textarea") inner=`<textarea id="lf_${f.key}" rows="2">${esc(v)}</textarea>`;
    else if(f.type==="date") inner=`<input id="lf_${f.key}" type="date" value="${esc(toDateInput(v))}">`;
    else if(f.money) inner=`<input id="lf_${f.key}" class="numgrp" inputmode="numeric" value="${v!==""&&v!=null?groupVN(v):""}" placeholder="0">`;
    else inner=`<input id="lf_${f.key}" value="${esc(v)}" placeholder="${esc(f.ph||"")}">`;
    return `<div class="${(f.req?"req":"")}${w}"><label>${esc(f.label)}</label>${inner}</div>`;
  }).join("");
  const root=$("#modalRoot");
  root.innerHTML=`<div class="modal-bg"><div class="modal">
    <div class="modal-head"><span>${edit?"Chỉnh sửa — "+title:"Thêm mới — "+title}</span><button class="x" id="lf_close">×</button></div>
    <div class="form-grid">
      ${unitField}
      ${fieldHTML}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="lf_cancel">Hủy</button>
      <button class="btn btn-primary" id="lf_save">${edit?"Lưu thay đổi":"Thêm mới"}</button>
    </div>
  </div></div>`;
  const close=()=>root.innerHTML="";
  root.querySelectorAll(".numgrp").forEach(attachThousand);
  $("#lf_close").onclick=close;$("#lf_cancel").onclick=close;
  $("#lf_save").onclick=async()=>{
    const g=id=>{const e=$("#"+id);return e?e.value:"";};
    const out=Object.assign({},o);
    out.don_vi=isAdmin?g("lf_dv"):lockUnit;
    fields.forEach(f=>{ out[f.key]= f.money ? String(num(ungroup(g("lf_"+f.key)))) : g("lf_"+f.key).trim(); });
    const reqf=fields.find(f=>f.req);
    if(reqf && !out[reqf.key]){toast("Vui lòng nhập "+reqf.label.toLowerCase()+".","bad");return;}
    try{
      $("#lf_save").disabled=true;$("#lf_save").textContent="Đang lưu…";
      await saver(out);
      close();toast(edit?"Đã lưu thay đổi.":"Đã thêm mới.","ok");await reload();
    }catch(e){toast("Lưu thất bại: "+e.message,"bad");$("#lf_save").disabled=false;$("#lf_save").textContent=edit?"Lưu thay đổi":"Thêm mới";}
  };
}

  exp.onclick=()=>{const q=ddSearch.trim().toLowerCase();let data=base();if(q)data=data.filter(m=>[m.ho_ten,m.truong_lop,m.dia_chi,m.hoan_canh].some(x=>String(x||"").toLowerCase().includes(q)));

  box.appendChild(stats);box.appendChild(bulk);box.appendChild(card);
